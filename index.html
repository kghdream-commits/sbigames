<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Kick Challenge</title>

<style>
body {
    text-align: center;
    font-family: 'Malgun Gothic', sans-serif;
    background: #1a1a2e;
    color: #fff;
    margin: 0;
    padding: 20px;
    user-select: none;
}

h1 {
    color: #e43f5a;
    text-shadow: 0 0 10px rgba(228, 63, 90, 0.5);
}

.box {
    width: 90%;
    max-width: 420px;
    margin: auto;
    background: #162447;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    border: 1px solid #0f4c75;
}

/* 버튼 */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #e43f5a;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    box-shadow: 0 5px 0 #b22c44, 0 8px 15px rgba(0,0,0,0.3);
}

button:disabled {
    background: #555 !important;
    box-shadow: 0 5px 0 #333 !important;
}

input[type="number"] {
    width: 45%;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid #0f4c75;
    background: #1a1a2e;
    color: white;
    text-align: center;
}

/* 게임 영역 */
.center-target-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 25px auto;
    background: #111d35;
    border-radius: 24px;
    border: 3px solid #0f4c75;
    overflow: hidden;
}

#fx-canvas {
    position: absolute;
    width: 100%;
    height: 100%;
}

#target {
    position: absolute;
    width: 120px;
    height: 120px;
    left: 80px;
    top: 80px;
    font-size: 110px;
}

.gauge-v-track {
    position: absolute;
    left: 15px;
    top: 20px;
    width: 14px;
    height: 240px;
    background: rgba(255,255,255,0.08);
}

.gauge-v-pointer {
    position: absolute;
    left: -4px;
    width: 22px;
    height: 12px;
    background: #ff4757;
}

.gauge-h-track {
    position: absolute;
    left: 40px;
    bottom: 15px;
    width: 200px;
    height: 14px;
    background: rgba(255,255,255,0.08);
}

.gauge-h-pointer {
    position: absolute;
    width: 12px;
    height: 22px;
    background: #00d2d3;
}

#ball {
    font-size: 45px;
}

.record {
    background: #1f4068;
    padding: 15px;
    margin-top: 20px;
}

.status-msg {
    color: #ffd700;
}

.shoot-action-btn {
    width: 85%;
    padding: 15px;
    background: #e43f5a;
}

#btn-reset {
    background: #2ed573;
    width: 85%;
    padding: 15px;
}
</style>
</head>

<body>

<h1>🏃⚽ Run Kick Challenge</h1>

<div class="box">

<!-- ✅ 난이도 영역만 삭제됨 -->

<h3>러닝 거리 입력</h3>
<input id="km" type="number" placeholder="km 입력" min="1">
<button onclick="getTicket()">받기</button>

<h3 id="ticket-view">보유권 : 0</h3>

<p id="shoot-count-view">오늘의 누적 슈팅 횟수: 0회</p>
<p id="challenge-count-view">오늘의 도전 횟수: 1번째 슛 준비 중</p>

<hr>

<h4 id="game-status">거리를 입력해 슈팅권을 얻으세요!</h4>

<button id="main-shoot-btn" onclick="handleShootClick()" disabled>슈팅권 없음</button>
<button id="btn-reset" onclick="resetToReady()" style="display:none;">재시도</button>

<div id="target-wrapper" class="center-target-wrapper">
    <div id="target">🎯</div>
    <canvas id="fx-canvas"></canvas>

    <div class="gauge-v-track">
        <div id="v-center"></div>
        <div id="power-bar" class="gauge-v-pointer"></div>
        <div id="v-marker" class="gauge-v-marker"></div>
    </div>

    <div class="gauge-h-track">
        <div id="h-center"></div>
        <div id="direction-bar" class="gauge-h-pointer"></div>
        <div id="h-marker" class="gauge-h-marker"></div>
    </div>
</div>

<div id="ball">⚽</div>

<h2 id="result"></h2>

<div class="record">
    <p>오늘 BEST : <span id="today">0</span>m</p>
    <p>월간 BEST : <span id="month">0</span>m</p>
    <p>누적 거리 : <span id="daily">0</span>m</p>
</div>

</div>

<script>
let ticket = 0;
let gameState = "ready";

let todayShootCount = Number(localStorage.getItem("todayShootCount")) || 0;
let todayBest = Number(localStorage.getItem("today")) || 0;
let monthBest = Number(localStorage.getItem("month")) || 0;
let dailyDistance = Number(localStorage.getItem("dailyDistance")) || 0;

let vImgPos = 0, vImgDir = 2;
let hImgPos = 0, hImgDir = 2;

let vInterval = null;
let hInterval = null;

window.onload = function() {
    document.getElementById("today").innerText = todayBest;
    document.getElementById("month").innerText = monthBest;
    document.getElementById("daily").innerText = dailyDistance;
    refreshGameSystem();
};

function getTicket() {
    let km = Number(document.getElementById("km").value);

    if (!km || km < 1) {
        alert("1km 이상 입력");
        return;
    }

    ticket += km;
    alert("+" + km + " ticket");
    refreshGameSystem();
}

function handleShootClick() {
    if (gameState === "phase1") stopPhase1();
    else if (gameState === "phase2") stopPhase2();
}

function refreshGameSystem() {
    document.getElementById("ticket-view").innerText = "보유권 : " + ticket;

    let btn = document.getElementById("main-shoot-btn");

    if (ticket > 0) {
        btn.disabled = false;
        btn.innerText = "슛";
        gameState = "phase1";
        startVertical();
    } else {
        btn.disabled = true;
        btn.innerText = "슈팅권 없음";
    }
}

function startVertical() {
    clearInterval(vInterval);
    vImgPos = 0;
    vImgDir = 3;

    vInterval = setInterval(() => {
        vImgPos += vImgDir;
        if (vImgPos > 220 || vImgPos < 0) vImgDir *= -1;
        document.getElementById("power-bar").style.top = vImgPos + "px";
    }, 10);
}

function stopPhase1() {
    clearInterval(vInterval);
    gameState = "phase2";
    startHorizontal();
}

function startHorizontal() {
    clearInterval(hInterval);
    hImgPos = 0;
    hImgDir = 3;

    hInterval = setInterval(() => {
        hImgPos += hImgDir;
        if (hImgPos > 180 || hImgPos < 0) hImgDir *= -1;
        document.getElementById("direction-bar").style.left = hImgPos + "px";
    }, 10);
}

function stopPhase2() {
    clearInterval(hInterval);

    ticket--;

    let dist = Math.floor(Math.random() * 300) + 50;

    document.getElementById("result").innerText = dist + "m";

    if (dist > todayBest) {
        todayBest = dist;
        localStorage.setItem("today", todayBest);
    }

    dailyDistance += dist;
    localStorage.setItem("dailyDistance", dailyDistance);

    gameState = "ready";
    refreshGameSystem();
}
</script>

</body>
</html>
