<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baseball Hit Challenge</title>

<style>

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
background:#111827;
color:white;
font-family:'Malgun Gothic',sans-serif;
text-align:center;
overflow:hidden;
}


h1{
color:#ffd700;
text-shadow:0 0 15px #ffd700;
margin:10px 0;
}


.game{
width:95%;
max-width:430px;
margin:auto;
}


.field{
position:relative;
height:420px;
border-radius:25px;
overflow:hidden;
background:url("ground.png") center/cover;
transition:.25s;
}



/* ZONE */

.zone{
position:absolute;
width:170px;
height:200px;
left:50%;
top:110px;
transform:translateX(-50%);
border:3px solid white;
box-shadow:0 0 20px #00ffff;
overflow:hidden;
}



.cross-x,.cross-y{
position:absolute;
background:#ffd700;
}

.cross-x{
width:100%;
height:3px;
top:50%;
}

.cross-y{
height:100%;
width:3px;
left:50%;
}



.center{
position:absolute;
width:28px;
height:28px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:8px;
background:rgba(255,215,0,.25);
border:3px solid #ffd700;
}



/* GAUGE */

.v-bar,.h-bar{
position:absolute;
width:16px;
height:16px;
background:white;
border-radius:4px;
}


.v-bar{
left:50%;
transform:translateX(-50%);
top:0;
}


.h-bar{
top:50%;
transform:translateY(-50%);
left:0;
}




/* BALL */

.ball{
position:absolute;
width:12px;
height:12px;
border-radius:50%;
background:white;
box-shadow:0 0 12px white;
left:50%;
top:0;
transform:translateX(-50%);
z-index:20;
}



/* HOME FLY */

.flyBall{
animation:flyBall 1s ease-out forwards;
}


@keyframes flyBall{

0%{
transform:translate(-50%,0) scale(1);
}

40%{
transform:translate(20%,-160px) scale(1.8);
}

100%{
transform:translate(180%,-260px) scale(.2);
opacity:0;
}

}




.trail{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
background:white;
opacity:.7;
}




#hrImg{

position:absolute;
left:50%;
top:40%;

width:260px;

display:none;

transform:translate(-50%,-50%);

z-index:999;

pointer-events:none;

animation:hrPop .7s ease-out;
}



@keyframes hrPop{

0%{
opacity:0;
transform:translate(-50%,-50%) scale(.2);
}

45%{
opacity:1;
transform:translate(-50%,-50%) scale(1.3);
}

100%{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

}




.player{
position:absolute;
right:8px;
bottom:8px;
width:90px;
}




.result{
font-size:20px;
color:#ffd700;
margin-top:8px;
}


.combo{
font-size:16px;
color:#ff4757;
}


.scoreboard{
font-size:14px;
margin-top:6px;
}



button{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
padding:14px;
border:0;
border-radius:15px;
background:#e43f5a;
color:white;
font-size:18px;
}



.shake{
animation:shake .25s;
}


@keyframes shake{

0%{transform:translate(0)}

25%{transform:translate(10px,-8px)}

50%{transform:translate(-10px,8px)}

75%{transform:translate(8px,4px)}

100%{transform:translate(0)}

}

</style>

</head>


<body>


<h1>⚾ Baseball Hit</h1>


<div class="game">


<div id="field" class="field">


<div class="zone">


<div class="cross-x"></div>
<div class="cross-y"></div>

<div class="center"></div>


<div id="vbar" class="v-bar"></div>
<div id="hbar" class="h-bar"></div>

<div id="ball" class="ball"></div>


<img id="hrImg" src="homerun.png">


</div>


<img class="player" src="player.png">


<button onclick="action()" id="btn">
START
</button>


</div>



<div id="result" class="result">
준비
</div>


<div id="combo" class="combo">
🔥 COMBO 0
</div>



<div class="scoreboard">

🎯 SCORE:
<span id="score">0</span>

|

🏆 BEST:
<span id="best">0</span>

|

❤️ LIFE:
<span id="life">10</span>

</div>


</div>



<script>


let state="ready";

let v=0,h=0;

let vd=3,hd=3;

let vi,hi;


let life=10;

let score=0;

let best=
Number(localStorage.getItem("best"))||0;

let combo=0;



document.getElementById("best").innerText=best;




function resetGame(){


clearInterval(vi);
clearInterval(hi);


state="ready";


v=0;
h=0;



/* =====================
   잔상 완전 제거
===================== */

document.querySelectorAll(".trail")
.forEach(t=>t.remove());



let field=document.getElementById("field");

field.style.transform="scale(1)";

field.classList.remove("shake");



let ball=document.getElementById("ball");


ball.className="ball";

void ball.offsetWidth;


ball.style.animation="none";

ball.style.opacity="1";

ball.style.top="0";

ball.style.left="50%";

ball.style.transform=
"translateX(-50%) scale(1)";




let img=document.getElementById("hrImg");

img.style.display="none";

img.style.animation="none";

void img.offsetWidth;

img.style.animation="";




document.getElementById("btn").innerText="START";

document.getElementById("result").innerText="준비";



}




function start(){


state="vertical";


document.getElementById("btn").innerText="SWING";



vi=setInterval(()=>{


v+=vd;


if(v>=180||v<=0)
vd*=-1;



document.getElementById("vbar").style.top=v+"px";

document.getElementById("ball").style.top=v+"px";


},15);



}





function action(){


if(state==="end"){

resetGame();

start();

return;

}


if(state==="ready"){

start();

return;

}



if(state==="vertical"){


clearInterval(vi);

state="horizontal";


hi=setInterval(()=>{


h+=hd;


if(h>=120||h<=0)

hd*=-1;



document.getElementById("hbar").style.left=h+"px";


},15);


return;

}



if(state==="horizontal"){


clearInterval(hi);

judge();

state="end";

document.getElementById("btn").innerText="RETRY";

}


}





function judge(){


let dx=Math.abs(h-60);

let dy=Math.abs(v-100);


let result="";
let gain=0;

let isHR=false;



if(dx<22 && dy<25){

result="🔥 HOME RUN";

gain=300;

combo++;

isHR=true;

homeFX();

}

else if(dx<40){

result="💥 HIT";

gain=150;

combo=0;

}

else{

result="❌ MISS";

combo=0;

}



if(!isHR){

life--;

document.getElementById("life").innerText=life;

}



score+=gain;



if(score>best){

best=score;

localStorage.setItem("best",best);

}



document.getElementById("result").innerText=result;

document.getElementById("combo").innerText=
"🔥 COMBO "+combo;


document.getElementById("score").innerText=score;

document.getElementById("best").innerText=best;


}




function homeFX(){


let field=document.getElementById("field");

let ball=document.getElementById("ball");

let img=document.getElementById("hrImg");



img.style.display="block";



field.style.transform=
"scale(1.35) translateY(-30px)";


field.classList.add("shake");



ball.classList.add("flyBall");




for(let i=0;i<8;i++){


let t=document.createElement("div");

t.className="trail";


t.style.left=ball.offsetLeft+"px";

t.style.top=(ball.offsetTop+i*12)+"px";


field.appendChild(t);


setTimeout(()=>{

t.remove();

},1000);



}




setTimeout(()=>{


field.style.transform="scale(1)";

field.classList.remove("shake");


img.style.display="none";


ball.className="ball";

void ball.offsetWidth;


ball.style.opacity="1";

ball.style.top="0";

ball.style.left="50%";

ball.style.transform=
"translateX(-50%) scale(1)";



},1000);



}



</script>


</body>
</html>
