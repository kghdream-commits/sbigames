# 🏃⚽ Run Kick Challenge

<h3>러닝 거리 입력</h3>
<input id="km" type="number" placeholder="km 입력" min="1">
<button onclick="getTicket()">받기</button>

<h3 id="ticket-view" style="color: #4cd137; margin: 15px 0 5px 0;">보유권 : 0</h3>

<p id="shoot-count-view" style="font-size: 0.9rem; color: #a4b0be; margin: 5px 0 2px 0;">
오늘의 누적 슈팅 횟수: 0회
</p>

<p id="challenge-count-view" style="font-size: 1rem; color: #00d2d3; font-weight: bold; margin: 2px 0 15px 0;">
오늘의 도전 횟수: 1번째 슛 준비 중
</p>

<hr style="border: 0; border-top: 1px solid #0f4c75; margin: 15px 0;">

<h4 id="game-status" class="status-msg">
거리를 입력해 슈팅권을 얻으세요!
</h4>

<button id="main-shoot-btn" class="shoot-action-btn"
onclick="handleShootClick()" disabled style="background: #555;">
슈팅권 없음
</button>

<button id="btn-reset" onclick="resetToReady()" style="display: none;">
🎮 재시도 (스페이스바 가능)
</button>

<div id="target-wrapper" class="center-target-wrapper">
    <div id="target">🎯</div>

    <canvas id="fx-canvas" width="280" height="280"></canvas>

    <div id="perfect-popup">PERFECT!!</div>

    <div class="gauge-v-track">
        <div id="v-center" class="gauge-v-center-line"></div>
        <div id="power-bar" class="gauge-v-pointer"></div>
        <div id="v-marker" class="gauge-v-marker"></div>
    </div>

    <div class="gauge-h-track">
        <div id="h-center" class="gauge-h-center-line"></div>
        <div id="direction-bar" class="gauge-h-pointer"></div>
        <div id="h-marker" class="gauge-h-marker"></div>
    </div>
</div>

<div id="ball">⚽</div>

<h2 id="result" style="color: #ff4757; min-height: 60px; margin: 10px 0;"></h2>

<div class="record">
    <p>오늘 BEST : <span id="today">0</span>m</p>
    <p>월간 BEST : <span id="month">0</span>m</p>
    <p>누적 거리 : <span id="daily">0</span>m</p>
</div>
