<!DOCTYPE html>  <html>  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Run Kick Challenge</title>  <style>  
body {  
    text-align: center;  
    font-family: 'Malgun Gothic', sans-serif;  
    background: #1a1a2e;  
    color: #fff;  
    margin: 0;  
    padding: 20px;  
    user-select: none;  
}  
  
h1 {  
    color: #e43f5a;  
    text-shadow: 0 0 10px rgba(228, 63, 90, 0.5);  
}  
  
.box {  
    width: 90%;  
    max-width: 420px;  
    margin: auto;  
    background: #162447;  
    padding: 20px;  
    border-radius: 20px;  
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);  
    border: 1px solid #0f4c75;  
}  
  
/* 🕹️ 2번: 입체적인 3D 스타일 버튼 디자인 */  
button {  
    padding: 12px 25px;  
    border: none;  
    border-radius: 12px;  
    cursor: pointer;  
    background: #e43f5a;  
    color: white;  
    font-weight: bold;  
    font-size: 1rem;  
    box-shadow: 0 5px 0 #b22c44, 0 8px 15px rgba(0,0,0,0.3);  
    transition: all 0.1s ease;  
    position: relative;  
}  
  
button:active {  
    transform: translateY(4px);  
    box-shadow: 0 1px 0 #b22c44, 0 3px 5px rgba(0,0,0,0.3);  
}  
  
button:disabled {  
    background: #555 !important;  
    box-shadow: 0 5px 0 #333 !important;  
    cursor: not-allowed;  
    transform: none !important;  
}  
  
input[type="number"] {  
    width: 45%;  
    padding: 11px;  
    border-radius: 8px;  
    border: 1px solid #0f4c75;  
    background: #1a1a2e;  
    color: white;  
    font-size: 1rem;  
    text-align: center;  
    margin-right: 5px;  
}  
  
/* ===================================================  
   🎯 과녁 일체형 액자 조준 시스템 (4번: 네온 아우라 추가)  
   =================================================== */  
.center-target-wrapper {  
    position: relative;  
    width: 280px;  
    height: 280px;  
    margin: 25px auto;  
    background: #111d35;  
    border-radius: 24px;  
    border: 3px solid #0f4c75;  
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6);  
    overflow: hidden;  
    transition: all 0.4s ease; /* 네온 아우라 전형 효과용 */  
}  
  
/* 👑 4번: 골든슛/실버슛 테두리 스페셜 네온 클래스 */  
.wrapper-golden {  
    border-color: #ffd700 !important;  
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 20px #ffd700, 0 0 40px rgba(255,215,0,0.4) !important;  
    animation: borderPulseGolden 1.5s infinite alternate;  
}  
.wrapper-silver {  
    border-color: #00ffcc !important;  
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 20px #00ffcc, 0 0 40px rgba(0,255,204,0.4) !important;  
    animation: borderPulseSilver 1.5s infinite alternate;  
}  
  
@keyframes borderPulseGolden {  
    0% { box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 10px #ffd700; }  
    100% { box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 25px #ffd700, 0 0 45px #ff007f; }  
}  
@keyframes borderPulseSilver {  
    0% { box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 10px #00ffcc; }  
    100% { box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 25px #00ffcc, 0 0 45px #00d2d3; }  
}  
  
#fx-canvas {  
    position: absolute;  
    top: 0;  
    left: 0;  
    width: 100%;  
    height: 100%;  
    z-index: 5;  
    pointer-events: none;  
}  
  
#perfect-popup {  
    position: absolute;  
    width: 100%;  
    top: 40%;  
    left: 0;  
    font-size: 34px;  
    font-weight: 900;  
    z-index: 6;  
    pointer-events: none;  
    opacity: 0;  
    transform: scale(0.3);  
    font-family: 'Arial Black', sans-serif;  
}  
  
@keyframes pop-bounce {  
    0% { opacity: 0; transform: scale(0.3) rotate(-15deg); }  
    50% { opacity: 1; transform: scale(1.4) rotate(10deg); }  
    70% { transform: scale(0.9) rotate(-5deg); }  
    100% { opacity: 1; transform: scale(1) rotate(0deg); }  
}  
  
#target {  
    position: absolute;  
    width: 120px;  
    height: 120px;  
    left: 80px;  
    top: 80px;  
    font-size: 110px;  
    line-height: 120px;  
    text-align: center;  
    z-index: 1;  
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);  
}  
  
/* ↕️ 왼쪽 상하 트랙 */  
.gauge-v-track {  
    position: absolute;  
    left: 15px;  
    top: 20px;  
    width: 14px;  
    height: 240px;  
    background: rgba(255, 255, 255, 0.08);  
    border-radius: 7px;  
    z-index: 2;  
}  
.gauge-v-center-line {  
    position: absolute;  
    top: 47%;  
    left: -1px;  
    width: 16px;  
    height: 16px;   
    background: #ffd700;  
    border-radius: 3px;  
    transition: all 0.3s ease;  
}  
.gauge-v-pointer {  
    position: absolute;  
    left: -4px;  
    top: 0px;  
    width: 22px;  
    height: 12px;  
    background: #ff4757;  
    border-radius: 4px;  
    box-shadow: 0 0 10px #ff4757;  
    z-index: 4;  
}  
/* 📍 3번: 상하 조준 오차 마킹 잔상 디바이스 */  
.gauge-v-marker {  
    position: absolute;  
    left: 3px;  
    width: 8px;  
    height: 8px;  
    background: #ff4757;  
    border-radius: 50%;  
    box-shadow: 0 0 8px #ff4757;  
    z-index: 3;  
    display: none;  
}  
  
/* ↔️ 아래쪽 좌우 트랙 */  
.gauge-h-track {  
    position: absolute;  
    left: 40px;  
    bottom: 15px;  
    width: 200px;  
    height: 14px;  
    background: rgba(255, 255, 255, 0.08);  
    border-radius: 7px;  
    z-index: 2;  
}  
.gauge-h-center-line {  
    position: absolute;  
    left: 46%;  
    top: -1px;  
    width: 16px;   
    height: 16px;  
    background: #ffd700;  
    border-radius: 3px;  
    transition: all 0.3s ease;  
}  
.gauge-h-pointer {  
    position: absolute;  
    left: 0px;  
    top: -4px;  
    width: 12px;  
    height: 22px;  
    background: #00d2d3;  
    border-radius: 4px;  
    box-shadow: 0 0 10px #00d2d3;  
    z-index: 4;  
}  
/* 📍 3번: 좌우 조준 오차 마킹 잔상 디바이스 */  
.gauge-h-marker {  
    position: absolute;  
    top: 3px;  
    width: 8px;  
    height: 8px;  
    background: #00d2d3;  
    border-radius: 50%;  
    box-shadow: 0 0 8px #00d2d3;  
    z-index: 3;  
    display: none;  
}  
  
#ball {  
    font-size: 45px;  
    margin: 10px 0;  
}  
  
.record {  
    background: #1f4068;  
    padding: 15px;  
    margin-top: 20px;  
    border-radius: 10px;  
}  
  
.status-msg {  
    color: #ffd700;  
    font-weight: bold;  
    margin: 10px 0;  
    font-size: 1.05rem;  
    min-height: 24px;  
}  
  
.shoot-action-btn {  
    width: 85%;  
    padding: 15px;  
    font-size: 1.1rem;  
    margin: 10px 0;  
    border-radius: 12px;  
    background: #e43f5a;  
    box-shadow: 0 5px 0 #b22c44, 0 8px 15px rgba(0,0,0,0.3);  
}  
.shoot-action-btn:active {  
    box-shadow: 0 1px 0 #b22c44, 0 3px 5px rgba(0,0,0,0.3);  
}  
  
#btn-reset {  
    background: #2ed573;  
    box-shadow: 0 5px 0 #21a054, 0 8px 15px rgba(0,0,0,0.3);  
    width: 85%;  
    padding: 15px;  
    margin: 10px 0;  
    font-size: 1.1rem;  
    border-radius: 12px;  
}  
#btn-reset:active {  
    box-shadow: 0 1px 0 #21a054, 0 3px 5px rgba(0,0,0,0.3);  
}  
  
.bonus-banner {  
    display: inline-block;  
    padding: 4px 10px;  
    border-radius: 6px;  
    font-size: 0.9rem;  
    font-weight: bold;  
    margin-left: 8px;  
    vertical-align: middle;  
}  
.banner-silver { background: #dfe6e9; color: #2d3436; box-shadow: 0 0 8px #fff; }  
.banner-golden { background: #ffd700; color: #2d3436; animation: pulse 1s infinite; box-shadow: 0 0 12px #ffd700; }  
  
@keyframes pulse {  
    0% { transform: scale(1); }  
    50% { transform: scale(1.06); }  
    100% { transform: scale(1); }  
}  
  
/* 📊 정확도 레이블 디자인 */  
.accuracy-label {  
    font-size: 0.95rem;  
    color: #a4b0be;  
    margin: 4px 0;  
    font-weight: normal;  
}  
</style>  </head>  <body>  <h1>🏃⚽ Run Kick Challenge</h1>  <div class="box">  
    <h3>  
        <span id="bonus-tag"></span>  
    </h3>  <h3>러닝 거리 입력</h3>  
<input id="km" type="number" placeholder="km 입력" min="1">  
<button onclick="getTicket()">받기</button>  
  
<h3 id="ticket-view" style="color: #4cd137; margin: 15px 0 5px 0;">보유권 : 0</h3>  
<p id="shoot-count-view" style="font-size: 0.9rem; color: #a4b0be; margin: 5px 0 2px 0;">오늘의 누적 슈팅 횟수: 0회</p>  
<p id="challenge-count-view" style="font-size: 1rem; color: #00d2d3; font-weight: bold; margin: 2px 0 15px 0;">오늘의 도전 횟수: 1번째 슛 준비 중</p>  

<hr style="border: 0; border-top: 1px solid #0f4c75; margin: 15px 0;">  

<h4 id="game-status" class="status-msg">거리를 입력해 슈팅권을 얻으세요!</h4>  
  
<button id="main-shoot-btn" class="shoot-action-btn" onclick="handleShootClick()" disabled style="background: #555;">슈팅권 없음</button>  
<button id="btn-reset" onclick="resetToReady()" style="display: none;">🎮 재시도 (스페이스바 가능)</button>  

<div id="target-wrapper" class="center-target-wrapper">  
    <div id="target">🎯</div>  
      
    <canvas id="fx-canvas" width="280" height="280"></canvas>  
    <div id="perfect-popup">PERFECT!!</div>  

    <div class="gauge-v-track">  
        <div id="v-center" class="gauge-v-center-line"></div>  
        <div id="power-bar" class="gauge-v-pointer"></div>  
        <div id="v-marker" class="gauge-v-marker"></div> </div>  

    <div class="gauge-h-track">  
        <div id="h-center" class="gauge-h-center-line"></div>  
        <div id="direction-bar" class="gauge-h-pointer"></div>  
        <div id="h-marker" class="gauge-h-marker"></div> </div>  
</div>  

<div id="ball">⚽</div>  

<h2 id="result" style="color: #ff4757; min-height: 60px; margin: 10px 0;"></h2>  

<div class="record">  
    <p>오늘 BEST : <span id="today">0</span>m</p>  
    <p>월간 BEST : <span id="month">0</span>m</p>  
    <p>누적 거리 : <span id="daily">0</span>m</p>  
</div>

</div>  <script>  
let ticket = 0;  
let gameState = "ready";   
let savedPowerAccuracy = 0;  
let savedDirectionAccuracy = 0;  
  
let todayShootCount = Number(localStorage.getItem("todayShootCount")) || 0;  
let todayBest = Number(localStorage.getItem("today")) || 0;  
let monthBest = Number(localStorage.getItem("month")) || 0;  
let dailyDistance = Number(localStorage.getItem("dailyDistance")) || 0;  
  
let vImgPos = 0; let vImgDir = 2;  
let hImgPos = 0; let hImgDir = 2;  
let vInterval = null; let hInterval = null;  
let currentSpeed = 2;  
  
let canvas, ctx;  
let particles = [];  
let animationFrameId = null;  
  
let currentBonusLimitModifier = 0;  
  
window.onload = function() {  
    canvas = document.getElementById("fx-canvas");  
    ctx = canvas.getContext("2d");  
      
    document.getElementById("today").innerText = todayBest;  
    document.getElementById("month").innerText = monthBest;  
    document.getElementById("daily").innerText = dailyDistance;  
      
    refreshGameSystem();  
  
    // ⌨️ 2번: 전역 스페이스바 키 입력 리스너 추가  
    window.addEventListener("keydown", function(e) {  
        if (e.code === "Space") {  
            e.preventDefault(); // 스페이스바 스크롤 현상 방지  
              
            let mainBtn = document.getElementById("main-shoot-btn");  
            let resetBtn = document.getElementById("btn-reset");  
  
            if (gameState === "phase1" || gameState === "phase2") {  
                handleShootClick();  
            } else if (gameState === "result" && resetBtn.style.display !== "none") {  
                resetToReady();  
            }  
        }  
    });  
};  
  
function getTicket() {  
    let kmInput = document.getElementById("km").value;  
    let km = Math.floor(Number(kmInput));  
  
    if (!kmInput || km < 1) {  
        alert("1km 이상의 올바른 숫자를 입력하세요.");  
        return;  
    }  
  
    ticket += km;  
    alert("🎉 성공! " + km + "km를 입력하여 " + km + "개의 슈팅권을 획득했습니다.");  
    document.getElementById("km").value = "";  
      
    if (gameState === "ready" || gameState === "result") {  
        document.getElementById("result").innerHTML = "";  
        document.getElementById("perfect-popup").style.opacity = "0";  
        document.getElementById("perfect-popup").style.animation = "none";  
        hideMarkers();  
        if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);  
          
        gameState = "ready";  
    }  
    refreshGameSystem();  
}  
  
function handleShootClick() {  
    if (gameState === "phase1") stopPhase1();  
    else if (gameState === "phase2") stopPhase2();  
}  
  
function refreshGameSystem() {  
    document.getElementById("ticket-view").innerText = "보유권 : " + ticket;  
    document.getElementById("shoot-count-view").innerText = "오늘의 누적 슈팅 횟수: " + todayShootCount + "회";  
      
    let nextShootNum = todayShootCount + 1;  
    document.getElementById("challenge-count-view").innerText = "오늘의 도전 횟수: " + nextShootNum + "번째 슛 준비 중";  
  
    let mainBtn = document.getElementById("main-shoot-btn");  
    let statusMsg = document.getElementById("game-status");  
    let resetBtn = document.getElementById("btn-reset");  
    let targetEl = document.getElementById("target");  
    let bonusTag = document.getElementById("bonus-tag");  
    let wrapperEl = document.getElementById("target-wrapper");  
  
    let vCenter = document.getElementById("v-center");  
    let hCenter = document.getElementById("h-center");  
  
    document.getElementById("perfect-popup").style.opacity = "0";  
    document.getElementById("perfect-popup").style.animation = "none";  
  
    if (gameState === "ready") {  
        resetBtn.style.display = "none";  
        hideMarkers();  
          
        // 👑 4번: 네온 아우라 클래스 초기화  
        wrapperEl.className = "center-target-wrapper";  
  
        if (ticket > 0) {  
            gameState = "phase1";  
            mainBtn.style.display = "inline-block";  
            mainBtn.disabled = false;  
            mainBtn.style.background = "#e43f5a";  
            mainBtn.style.boxShadow = "0 5px 0 #b22c44, 0 8px 15px rgba(0,0,0,0.3)";  
              
            let baseScale = 1;  
            if (dailyDistance > 1500) baseScale = 0.6;   
            else if (dailyDistance > 500) baseScale = 0.8;   
  
            // 👑 골든슛 돌입 (10, 20, 30...)  
            if (nextShootNum % 10 === 0) {  
                wrapperEl.classList.add("wrapper-golden"); // 황금 네온 점등  
  
                targetEl.style.transform = `scale(${baseScale * 1.5})`;   
                bonusTag.className = "bonus-banner banner-golden";  
                bonusTag.innerText = "🥇 골든슛 150%";  
                mainBtn.innerText = "👑 골든슛! (스페이스바)";  
                statusMsg.innerText = "🔥 [골든슛] 아우라 전개! 과녁 확장 및 판정 2배 버프 적용!";  
                  
                vCenter.style.top = "44%"; vCenter.style.height = "32px";  
                vCenter.style.background = "#ff007f";  
                vCenter.style.boxShadow = "0 0 15px #ff007f, 0 0 5px #fff";  
  
                hCenter.style.left = "44%"; hCenter.style.width = "32px";  
                hCenter.style.background = "#ff007f";  
                hCenter.style.boxShadow = "0 0 15px #ff007f, 0 0 5px #fff";  
  
                currentBonusLimitModifier = 10;   
  
            // 🥈 실버슛 돌입 (5, 15, 25...)  
            } else if (nextShootNum % 5 === 0) {  
                wrapperEl.classList.add("wrapper-silver"); // 실버 민트 네온 점등  
  
                targetEl.style.transform = `scale(${baseScale * 1.5})`;   
                bonusTag.className = "bonus-banner banner-silver";  
                bonusTag.innerText = "🥈 실버슛 130%";  
                mainBtn.innerText = "✨ 실버슛! (스페이스바)";  
                statusMsg.innerText = "⭐ [실버슛] 아우라 전개! 과녁 확장 및 판정 2배 버프 적용!";  
                  
                vCenter.style.top = "44%"; vCenter.style.height = "32px";  
                vCenter.style.background = "#00ffcc";  
                vCenter.style.boxShadow = "0 0 10px #00ffcc";  
  
                hCenter.style.left = "44%"; hCenter.style.width = "32px";  
                hCenter.style.background = "#00ffcc";  
                hCenter.style.boxShadow = "0 0 10px #00ffcc";  
  
                currentBonusLimitModifier = 10;   
  
            // ⚪ 일반 슛 돌입  
            } else {  
                targetEl.style.transform = `scale(${baseScale})`;  
                bonusTag.className = ""; bonusTag.innerText = "";  
                mainBtn.innerText = "지금이다! (스페이스바)";  
                statusMsg.innerText = "1단계: 상하 게이지가 요동칩니다! 정중앙 노란 칸에 타이밍을 맞추세요!";  
                  
                vCenter.style.top = "47%"; vCenter.style.height = "16px";  
                vCenter.style.background = "#ffd700"; vCenter.style.boxShadow = "none";  
  
                hCenter.style.left = "46%"; hCenter.style.width = "16px";  
                hCenter.style.background = "#ffd700"; hCenter.style.boxShadow = "none";  
  
                currentBonusLimitModifier = 0;  
            }  
              
            startVerticalLoop();  
        } else {  
            mainBtn.style.display = "inline-block";  
            mainBtn.disabled = true;  
            mainBtn.innerText = "슈팅권 없음";  
            mainBtn.style.background = "#555";  
            statusMsg.innerText = "거리를 입력해 슈팅권을 먼저 얻으세요!";  
            bonusTag.className = ""; bonusTag.innerText = "";  
        }  
    }  
}  
  
function startVerticalLoop() {  
    clearInterval(vInterval); vImgPos = 0;  
      
    if (dailyDistance > 1500) { currentSpeed = 5; document.getElementById("level").innerText = "난이도 : HARD"; }  
    else if (dailyDistance > 500) { currentSpeed = 3.5; document.getElementById("level").innerText = "난이도 : NORMAL"; }  
    else { currentSpeed = 2; document.getElementById("level").innerText = "난이도 : EASY"; }  
      
    vImgDir = currentSpeed;  
    vInterval = setInterval(() => {  
        vImgPos += vImgDir;  
        if (vImgPos >= 228 || vImgPos <= 0) vImgDir *= -1;   
        document.getElementById("power-bar").style.top = vImgPos + "px";  
    }, 15);  
}  
  
function stopPhase1() {  
    clearInterval(vInterval);  
    let diff = Math.abs(114 - vImgPos);   
    let accuracy = 100 - (diff * 0.88);  
    savedPowerAccuracy = accuracy < 0 ? 0 : accuracy;  
  
    // 📍 3번: 상하 멈춘 위치에 붉은 마커 박제  
    let vMarker = document.getElementById("v-marker");  
    vMarker.style.top = (vImgPos + 2) + "px";   
    vMarker.style.display = "block";  
  
    gameState = "phase2";  
    let mainBtn = document.getElementById("main-shoot-btn");  
    let statusMsg = document.getElementById("game-status");  
  
    mainBtn.innerText = "🎯 최종 슛!! (스페이스바)";  
    mainBtn.style.background = "#00d2d3";  
    mainBtn.style.boxShadow = "0 5px 0 #009ca0, 0 8px 15px rgba(0,0,0,0.3)";  
    statusMsg.innerText = "2단계: 좌우 게이지 교차 개시! 침착하게 슛 각도를 고정하세요!";  
      
    startHorizontalLoop();  
}  
  
function startHorizontalLoop() {  
    clearInterval(hInterval); hImgPos = 0; hImgDir = currentSpeed;  
    hInterval = setInterval(() => {  
        hImgPos += hImgDir;  
        if (hImgPos >= 188 || hImgPos <= 0) hImgDir *= -1;   
        document.getElementById("direction-bar").style.left = hImgPos + "px";  
    }, 15);  
}  
  
function stopPhase2() {  
    clearInterval(hInterval);   
      
    ticket--;  
    todayShootCount++;   
    localStorage.setItem("todayShootCount", todayShootCount);  
  
    let diff = Math.abs(94 - hImgPos);   
    let directionAccuracy = 100 - (diff * 1.05);  
    if (directionAccuracy < 0) directionAccuracy = 0;  
    savedDirectionAccuracy = directionAccuracy;  
  
    // 📍 3번: 좌우 멈춘 위치에 청록 마커 박제  
    let hMarker = document.getElementById("h-marker");  
    hMarker.style.left = (hImgPos + 2) + "px";  
    hMarker.style.display = "block";  
  
    let finalAccuracy = (savedPowerAccuracy + savedDirectionAccuracy) / 2;  
      
    let perfectLimit = 90 - currentBonusLimitModifier;  
    if (dailyDistance > 1500) { perfectLimit = 95 - currentBonusLimitModifier; }  
    else if (dailyDistance > 500) { perfectLimit = 92 - currentBonusLimitModifier; }  
  
    let resultText = ""; let baseDist = 0; let bonusMult = 1; let bonusText = "";  
  
    if (todayShootCount % 10 === 0) {   
        bonusMult = 1.5; bonusText = " 🥇[골든 1.5배!]";   
    } else if (todayShootCount % 5 === 0) {   
        bonusMult = 1.3; bonusText = " 🥈[실버 1.3배!]";   
    }  
  
    if (finalAccuracy >= perfectLimit) {   
        resultText = "🎯 PERFECT" + bonusText; baseDist = 300;   
        triggerVisualEffects("PERFECT");   
    }  
    else if (finalAccuracy >= 75) {   
        document.getElementById("perfect-popup").style.opacity = "0";   
        resultText = "🟠 GREAT" + bonusText; baseDist = 230;   
        triggerVisualEffects("GREAT");   
    }  
    else {   
        document.getElementById("perfect-popup").style.opacity = "0";   
        if (finalAccuracy >= 55) { resultText = "🟡 GOOD" + bonusText; baseDist = 170; }  
        else if (finalAccuracy >= 30) { resultText = "⚪ NORMAL" + bonusText; baseDist = 80; }  
        else { resultText = "❌ MISS"; baseDist = 0; }  
    }  
  
    let finalDistance = Math.round((baseDist * bonusMult) * (Math.min(finalAccuracy + currentBonusLimitModifier, 100) / 100));  
      
    // 📊 3번: 결과 레이블에 상하/좌우 정밀 스펙 피드백 출력  
    let specDataText = `<div class="accuracy-label">종합 정확도: ${Math.round(finalAccuracy)}% (상하 ${Math.round(savedPowerAccuracy)}% | 좌우 ${Math.round(savedDirectionAccuracy)}%)</div>`;  
    document.getElementById("result").innerHTML = resultText + "<br>" + finalDistance + "m" + specDataText;  
  
    saveScores(finalDistance);  
  
    gameState = "result";  
    let mainBtn = document.getElementById("main-shoot-btn");  
    let statusMsg = document.getElementById("game-status");  
    let resetBtn = document.getElementById("btn-reset");  
  
    mainBtn.style.display = "none";  
      
    if (ticket > 0) {  
        resetBtn.style.display = "inline-block";  
        statusMsg.innerText = "슈팅 성료! 스페이스바 혹은 재시도 버튼으로 다음 슈팅권을 세팅하세요.";  
    } else {  
        resetBtn.style.display = "none";  
        statusMsg.innerText = "슈팅권을 전부 소진했습니다. 러닝 거리를 재입력해 충전해 주세요!";  
    }  
      
    document.getElementById("ticket-view").innerText = "보유권 : " + ticket;  
}  
  
function hideMarkers() {  
    document.getElementById("v-marker").style.display = "none";  
    document.getElementById("h-marker").style.display = "none";  
}  
  
function triggerVisualEffects(type) {  
    const popup = document.getElementById("perfect-popup");  
      
    if(type === "PERFECT") {  
        popup.innerText = "PERFECT!!";  
        popup.style.color = "#ffd700";  
        popup.style.textShadow = "0 0 10px #ff4757, 0 0 25px #ff4757, 0 0 40px #ffd700";  
    } else {  
        popup.innerText = "GREAT!";  
        popup.style.color = "#ff9f43";  
        popup.style.textShadow = "0 0 10px #ff9f43, 0 0 20px #fff";  
    }  
      
    popup.style.animation = "none";  
    popup.offsetHeight;   
    popup.style.animation = "pop-bounce 0.8s forwards";  
  
    particles = [];  
    const count = type === "PERFECT" ? 70 : 35;  
    const colors = type === "PERFECT" ?   
        ["#ffd700", "#ff4757", "#00d2d3", "#ff9f43", "#a55eea", "#fff"] :   
        ["#ff9f43", "#ff4757", "#ffd700", "#fff"];  
      
    for (let i = 0; i < count; i++) {  
        particles.push({  
            x: canvas.width / 2,  
            y: canvas.height / 2,  
            radius: Math.random() * 3.5 + 2,  
            color: colors[Math.floor(Math.random() * colors.length)],  
            speed: Math.random() * 6 + (type === "PERFECT" ? 3 : 1.5),  
            angle: Math.random() * Math.PI * 2,  
            alpha: 1,  
            decay: Math.random() * 0.015 + 0.012  
        });  
    }  
      
    cancelAnimationFrame(animationFrameId);  
    animateParticles();  
}  
  
function animateParticles() {  
    ctx.clearRect(0, 0, canvas.width, canvas.height);  
    let alive = false;  
  
    particles.forEach(p => {  
        if (p.alpha > 0) {  
            alive = true;  
            p.x += Math.cos(p.angle) * p.speed;  
            p.y += Math.sin(p.angle) * p.speed + 0.25;   
            p.alpha -= p.decay;  
  
            ctx.save();  
            ctx.globalAlpha = p.alpha;  
            ctx.beginPath();  
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);  
            ctx.fillStyle = p.color;  
            ctx.shadowBlur = 8;  
            ctx.shadowColor = p.color;  
            ctx.fill();  
            ctx.restore();  
        }  
    });  
  
    if (alive) {  
        animationFrameId = requestAnimationFrame(animateParticles);  
    } else {  
        ctx.clearRect(0, 0, canvas.width, canvas.height);  
    }  
}  
  
function resetToReady() {  
    document.getElementById("result").innerHTML = "";  
    document.getElementById("power-bar").style.top = "0px";  
    document.getElementById("direction-bar").style.left = "0px";  
      
    document.getElementById("perfect-popup").style.opacity = "0";  
    document.getElementById("perfect-popup").style.animation = "none";  
    hideMarkers();  
    if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);  
      
    gameState = "ready";  
    refreshGameSystem();  
}  
  
function saveScores(dist) {  
    if (dist > todayBest) { todayBest = dist; localStorage.setItem("today", todayBest); }  
    if (dist > monthBest) { monthBest = dist; localStorage.setItem("month", monthBest); }  
    dailyDistance += dist; localStorage.setItem("dailyDistance", dailyDistance);  
  
    document.getElementById("today").innerText = todayBest;  
    document.getElementById("month").innerText = monthBest;  
    document.getElementById("daily").innerText = dailyDistance;  
}
