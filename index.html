<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Run Kick Challenge - Full Fix</title>
<style>
    body { text-align: center; font-family: 'Malgun Gothic', sans-serif; background: #1a1a2e; color: #fff; margin: 0; padding: 20px; user-select: none; }
    .box { width: 90%; max-width: 420px; margin: auto; background: #162447; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 1px solid #0f4c75; }
    
    /* 1. 버튼 UI 수정: 회색 음영 중첩 제거 */
    .shoot-btn { width: 100%; padding: 15px; margin: 15px 0; border: none; border-radius: 12px; background: #e43f5a; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 0 #b22c44; }
    .shoot-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #b22c44; }
    
    .center-target-wrapper { position: relative; width: 280px; height: 280px; margin: 25px auto; background: #0f172a; border-radius: 24px; border: 3px solid #0f4c75; overflow: hidden; }
    
    /* 3. 골대 및 키퍼 UI */
    #goal-area { position: absolute; width: 180px; height: 120px; border: 4px solid #fff; border-top-left-radius: 40px; border-top-right-radius: 40px; left: 50px; top: 40px; }
    #keeper { position: absolute; width: 40px; height: 40px; left: 120px; top: 80px; font-size: 30px; transition: all 0.5s ease-out; }
    #ball { position: absolute; left: 120px; bottom: 20px; font-size: 40px; transition: all 0.5s ease-out; z-index: 10; }
    
    .gauge-v-pointer { position: absolute; left: 15px; top: 0px; width: 12px; height: 12px; background: #ff4757; border-radius: 50%; }
    .gauge-h-pointer { position: absolute; bottom: 15px; left: 0px; width: 12px; height: 12px; background: #00d2d3; border-radius: 50%; }
</style>
</head>
<body>
    <div class="box">
        <h3 id="ticket-view">보유권 : 0</h3>
        <button id="main-btn" class="shoot-btn" onclick="handleShoot()">슈팅 준비</button>
        
        <div class="center-target-wrapper">
            <div id="goal-area"></div>
            <div id="keeper">🧤</div>
            <div id="ball">⚽</div>
            <div id="v-bar" class="gauge-v-pointer"></div>
            <div id="h-bar" class="gauge-h-pointer"></div>
        </div>
        <h2 id="result-text"></h2>
    </div>

<script>
    let gameState = "ready", vPos = 0, hPos = 0, vDir = 5, hDir = 5, vInt, hInt;
    let ticket = 0;

    function handleShoot() {
        if(gameState === "ready") {
            gameState = "v";
            vInt = setInterval(() => { vPos += vDir; if(vPos > 240 || vPos < 0) vDir *= -1; document.getElementById("v-bar").style.top = vPos + "px"; }, 20);
        } else if(gameState === "v") {
            clearInterval(vInt); gameState = "h";
            hInt = setInterval(() => { hPos += hDir; if(hPos > 240 || hPos < 0) hDir *= -1; document.getElementById("h-bar").style.left = hPos + "px"; }, 20);
        } else if(gameState === "h") {
            clearInterval(hInt); checkGoal();
        }
    }

    function checkGoal() {
        // 2. 정확도 판정 로직: 세로/가로 모두 오차 20 이내여야 함 (&& 조건)
        let isGoal = Math.abs(120 - vPos) < 20 && Math.abs(120 - hPos) < 20;
        let ball = document.getElementById("ball");
        let keeper = document.getElementById("keeper");

        if(isGoal) {
            // 3. 골인 연출: 공이 골대 안으로 빨려 들어감
            ball.style.transform = "translateY(-150px) scale(0.5)";
            keeper.style.transform = "translateX(50px)";
            document.getElementById("result-text").innerText = "GOAL!!";
        } else {
            // 4. 블락 연출: 키퍼가 공을 쳐냄
            ball.style.transform = "translateY(-30px) rotate(45deg)";
            keeper.style.transform = "translateX(-40px)";
            document.getElementById("result-text").innerText = "BLOCKED!";
        }
        gameState = "result";
        setTimeout(reset, 2000);
    }

    function reset() {
        document.getElementById("ball").style.transform = "none";
        document.getElementById("keeper").style.transform = "none";
        document.getElementById("result-text").innerText = "";
        gameState = "ready";
    }
</script>
</body>
</html>
