<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baseball Hit Challenge</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    text-align:center;
    font-family:'Malgun Gothic',sans-serif;
}

h1{
    color:#ffd700;
}


.game{
    width:95%;
    max-width:430px;
    margin:auto;
}


.field{

position:relative;
height:620px;

overflow:hidden;

background:url("ground.png") center/cover;

border-radius:20px;

}


/* 타격 박스 */

.zone{

position:absolute;

width:180px;
height:240px;

left:50%;
top:150px;

transform:translateX(-50%);

border:3px solid white;

box-shadow:0 0 20px #00ffff;

}



/* 십자가 */

.cross-x{

position:absolute;

width:100%;
height:3px;

top:50%;

background:#ff4757;

}



.cross-y{

position:absolute;

height:100%;
width:3px;

left:50%;

background:#00d2d3;

}



/* 퍼펙트 중앙 */

.center{

position:absolute;

width:45px;
height:45px;

left:50%;
top:50%;

transform:translate(-50%,-50%);

border:3px solid #ffd700;

box-shadow:0 0 20px #ffd700;

z-index:3;

}




/* =====================
   게이지 (타격박스 내부)
===================== */


/* 상하 */

.v-gauge{

position:absolute;

left:50%;
top:0;

transform:translateX(-50%);

width:12px;

height:100%;

background:rgba(255,255,255,0.25);

z-index:5;

}



.v-bar{

position:absolute;

left:0;

width:12px;

height:28px;

background:#ff4757;

border-radius:10px;

box-shadow:0 0 10px red;

}



/* 좌우 */

.h-gauge{

position:absolute;

left:0;

top:50%;

transform:translateY(-50%);

width:100%;

height:12px;

background:rgba(255,255,255,0.25);

z-index:5;

}



.h-bar{

position:absolute;

top:0;

width:28px;

height:12px;

background:#00ffff;

border-radius:10px;

box-shadow:0 0 10px #00ffff;

}





.ball{

position:absolute;

width:45px;

height:auto;

left:50%;

top:520px;

transform:translateX(-50%);

z-index:10;

}



.player{

position:absolute;

right:15px;

bottom:15px;

width:120px;

height:auto;

z-index:10;

}



.result{

height:60px;

font-size:28px;

color:#ffd700;

}



button{

padding:15px 25px;

margin:8px;

font-size:18px;

border-radius:15px;

border:0;

background:#e43f5a;

color:white;

}

</style>

</head>


<body>


<h1>⚾ Baseball Hit Challenge</h1>


<div class="game">


<div class="field">



<div class="zone">


<div class="cross-x"></div>

<div class="cross-y"></div>


<div class="center"></div>



<!-- 게이지 위치 수정됨 -->

<div class="v-gauge">

<div id="vbar" class="v-bar"></div>

</div>



<div class="h-gauge">

<div id="hbar" class="h-bar"></div>

</div>



</div>



<img id="ball"
class="ball"
src="ball.png">



<img class="player"
src="player.png">



<img id="home"
src="homerun.png"
style="
display:none;
position:absolute;
width:250px;
left:50%;
top:220px;
transform:translateX(-50%);
z-index:20;
">


</div>



<div id="result" class="result">
준비
</div>



<button onclick="start()">
시작
</button>


<button onclick="action()">
스윙
</button>


</div>




<script>


let state="ready";


let v=0;
let h=0;


let vd=3;
let hd=3;


let vi;
let hi;



document.addEventListener("keydown",e=>{

if(e.code==="Space")
action();

});





function start(){


state="vertical";


document.getElementById("result")
.innerText="상하 조준";



document.getElementById("home")
.style.display="none";



v=0;



clearInterval(vi);



vi=setInterval(()=>{


v+=vd;


if(v>=212 || v<=0)
vd*=-1;



document.getElementById("vbar")
.style.top=v+"px";



},15);



}




function action(){



if(state==="vertical"){


clearInterval(vi);


state="horizontal";


document.getElementById("result")
.innerText="좌우 조준";



h=0;


clearInterval(hi);



hi=setInterval(()=>{


h+=hd;


if(h>=152 || h<=0)
hd*=-1;



document.getElementById("hbar")
.style.left=h+"px";



},15);



}



else if(state==="horizontal"){


clearInterval(hi);


judge();


state="end";


}



}





function judge(){



// 타격박스 기준 중앙

let verticalError=Math.abs(v-106);

let horizontalError=Math.abs(h-76);



let error=Math.sqrt(
verticalError*verticalError+
horizontalError*horizontalError
);



let text;



if(error<25){


text="🔥 HOME RUN";


document.getElementById("home")
.style.display="block";


}

else if(error<60){

text="💥 3루타";

}

else if(error<100){

text="⚾ 2루타";

}

else{

text="❌ 헛스윙";

}



document.getElementById("result")
.innerText=text;



}



</script>


</body>
</html>
