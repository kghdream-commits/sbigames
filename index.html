<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Kick Challenge</title>

<style>
body{
    text-align:center;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background:#1a1a2e;
    color: #fff;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #e43f5a;
}

.box{
    width:90%;
    max-width:420px;
    margin:auto;
    background:#162447;
    padding:20px;
    border-radius:20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    border: 1px solid #0f4c75;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background: #e43f5a;
    color: white;
    font-weight: bold;
    font-size: 1rem;
}

button:active {
    background: #b22c44;
}

button:disabled {
    background: #555;
    cursor: not-allowed;
}

input[type="number"]{
    width:60%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #0f4c75;
    background: #1a1a2e;
    color: white;
    font-size: 1rem;
    text-align: center;
}

#target{
    font-size:90px;
    margin:30px;
    transition:0.3s;
}

#ball{
    font-size:50px;
    margin:20px;
    transition: 0.1s;
}

.control-section {
    background: #1f4068;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    border: 1px solid #0f4c75;
}

.control-section.disabled {
    opacity: 0.3;
    pointer-events: none;
}

.record{
    background:#1f4068;
    padding:15px;
    margin-top:30px;
    border-radius: 10px;
}

.home-btn {
    display: inline-block;
    margin-top: 20px;
    color: #b2bec3;
    text-decoration: none;
    font-size: 0.9rem;
    border-bottom: 1px solid #b2bec3;
    padding-bottom: 2px;
}

.status-msg {
    color: #ffd700;
    font-weight: bold;
    margin: 10px 0;
    min-height: 24px;
}

.bonus-badge {
    background: #ff4757;
    color: white;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 0.8rem;
    display: inline-block;
    margin-bottom: 5px;
}

/* 애니메이션 */
.perfect{ animation:perfect 1s forwards; }
.great{ animation:great 1s forwards; }
.good{ animation:good 1s forwards; }
.normal{ animation:normal 1s forwards; }
.miss{ animation:miss 1s forwards; }

@keyframes perfect{
    100%{ transform:translateY(-200px) scale(0.5); }
}
@keyframes great{
    100%{ transform:translate(100px,-150px); }
}
@keyframes good{
    100%{ transform:translate(150px,-80px); }
}
@keyframes normal{
    100%{ transform:translate(180px,20px); }
}
@keyframes miss{
    100%{ transform:translate(250px,100px) rotate(180deg); }
}
</style>

</head>

<body>

<h1>🏃⚽ Run Kick Challenge</h1>

<div class="box">

<h3 id="level">난이도 : EASY</h3>

<h3>러닝 거리 입력</h3>
<input id="km" type="number" placeholder="km 입력">
<button onclick="getTicket()">받기</button>
<p id="ticket">보유권 : 0</p>
<p id="shoot-count-view" style="font-size: 0.9rem; color: #a4b0be;">오늘의 누적 슈팅 횟수: 0회</p>

<hr style="border: 0; border-top: 1px solid #0f4c75;">

<h4 id="game-status" class="status-msg">거리를 입력해 슈팅권을 얻으세요!</h4>

<div id="section-power" class="control-section disabled">
    <div id="bonus-info" class="bonus-badge" style="display:none;">특수 슛 조준 중!</div><br>
    <strong>[1단계] 상하 조절</strong><br>
    <input id="power" type="range" min="0" max="100" value="50" style="width:80%; margin: 10px 0;"><br>
    <button id="btn-power" onclick="lockPower()">상하 고정!</button>
</div>

<div id="section-direction" class="control-section disabled">
    <strong>[2단계] 좌우 조절</strong><br>
    <input id="direction" type="range" min="0" max="100" value="50" style="width:80%; margin: 10px 0;"><br>
    <button id="btn-direction" onclick="kick()">최종 슛!!</button>
</div>

<div id="target">🎯</div>
<div id="ball">⚽</div>

<h2 id="result"></h2>

<div class="record">
<p>오늘 BEST : <span id="today">0</span>m</p>
<p>월간 BEST : <span id="month">0</span>m</p>
<p>누적 거리 : <span id="daily">0</span>m</p>
</div>

</div>

<a href="index.html" class="home-btn">← 홈화면으로 돌아가기</a>

<script>
let ticket = 0;
let gameState = "ready"; 
let savedPowerAccuracy = 0;
let todayShootCount = Number(localStorage.getItem("todayShootCount")) || 0; // 누적 슈팅 수 기록

let todayBest = Number(localStorage.getItem("today")) || 0;
let monthBest = Number(localStorage.getItem("month")) || 0;
let dailyDistance = Number(localStorage.getItem("dailyDistance")) || 0;

document.getElementById("today").innerText = todayBest;
document.getElementById("month").innerText = monthBest;
document.getElementById("daily").innerText = dailyDistance;
document.getElementById("shoot-count-view").innerText = "오늘의 누적 슈팅 횟수: " + todayShootCount + "회";

function checkNextShootBonus() {
    let nextShoot = todayShootCount + 1;
    const bonusInfo = document.getElementById("bonus-info");
    
    if (nextShoot > 0 && nextShoot % 5 === 0) {
        bonusInfo.style.display = "inline-block";
        if (nextShoot % 10 === 0) {
            bonusInfo.innerText = "⭐ 다음 슛: 골든 슛! (보너스 점수 대폭 폭발)";
            bonusInfo.style.background = "#ffa500";
        } else {
            bonusInfo.innerText = "✨ 다음 슛: 실버 슛! (보너스 점수 추가)";
            bonusInfo.style.background = "#a4b0be";
        }
    } else {
        bonusInfo.style.display = "none";
    }
}

function updateUI() {
    document.getElementById("ticket").innerText = "보유권 : " + ticket;
    document.getElementById("shoot-count-view").innerText = "오늘의 누적 슈팅 횟수: " + todayShootCount + "회";
    
    const secPower = document.getElementById("section-power");
    const secDirection = document.getElementById("section-direction");
    const statusMsg = document.getElementById("game-status");

    if (ticket <= 0 && gameState === "ready") {
        secPower.classList.add("disabled");
        secDirection.classList.add("disabled");
        statusMsg.innerText = "거리를 입력해 슈팅권을 얻으세요!";
    } else if (gameState === "ready" && ticket > 0) {
        secPower.classList.remove("disabled");
        secDirection.classList.add("disabled");
        statusMsg.innerText = "1단계: 상하 게이지를 맞추고 고정 버튼을 누르세요!";
        checkNextShootBonus();
    }
}

function getTicket(){
    let km = Math.floor(Number(document.getElementById("km").value));

    if(km < 1){
        alert("1km 이상 입력하세요.");
        return;
    }

    // 입력한 km만큼 슈팅 횟수 지급!
    ticket += km;
    alert("🎉 " + km + "km를 달려 " + km + "개의 슈팅권을 획득했습니다!");

    if(gameState === "ready") {
        updateUI();
    } else {
        document.getElementById("ticket").innerText = "보유권 : " + ticket;
    }
}

function lockPower() {
    if(ticket <= 0){
        alert("슈팅권이 없습니다.");
        gameState = "ready";
        updateUI();
        return;
    }

    let power = Number(document.getElementById("power").value);
    savedPowerAccuracy = 100 - Math.abs(50 - power);
    
    gameState = "direction_phase";
    document.getElementById("section-power").classList.add("disabled");
    document.getElementById("section-direction").classList.remove("disabled");
    document.getElementById("game-status").innerText = "2단계: 좌우 게이지를 맞추고 최종 슛을 쏘세요!";
}

function kick(){
    if(ticket <= 0){
        alert("슈팅권 없음");
        gameState = "ready";
        updateUI();
        return;
    }

    ticket--;
    todayShootCount++; // 실제 발사 시 슛 카운트 증가
    localStorage.setItem("todayShootCount", todayShootCount);

    let perfectLimit = 90;
    let targetScale = 1;

    if(dailyDistance > 1500){
        perfectLimit = 96;
        targetScale = 0.6;
        document.getElementById("level").innerText = "난이도 : HARD";
    }
    else if(dailyDistance > 500){
        perfectLimit = 93;
        targetScale = 0.8;
        document.getElementById("level").innerText = "난이도 : NORMAL";
    }
    else{
        document.getElementById("level").innerText = "난이도 : EASY";
    }

    document.getElementById("target").style.transform = "scale(" + targetScale + ")";

    let direction = Number(document.getElementById("direction").value);
    let directionAccuracy = 100 - Math.abs(50 - direction);

    let accuracy = (savedPowerAccuracy + directionAccuracy) / 2;

    let result;
    let distance;
    let bonusMultiplier = 1; // 기본 배수
    let bonusText = "";

    // 특수 슛 보너스 계산 (5, 15, 25... = 실버슛 / 10, 20, 30... = 골든슛)
    if (todayShootCount % 5 === 0) {
        if (todayShootCount % 10 === 0) {
            bonusMultiplier = 1.5; // 골든슛은 거리 1.5배!
            bonusText = " 🥇[골든슛 발동!!]";
        } else {
            bonusMultiplier = 1.25; // 실버슛은 거리 1.25배!
            bonusText = " 🥈[실버슛 발동!!]";
        }
    }

    if(accuracy >= perfectLimit){
        result = "🎯 PERFECT" + bonusText;
        distance = 300 * bonusMultiplier;
    }
    else if(accuracy >= 75){
        result = "🟠 GREAT" + bonusText;
        distance = 230 * bonusMultiplier;
    }
    else if(accuracy >= 55){
        result = "🟡 GOOD" + bonusText;
        distance = 170 * bonusMultiplier;
    }
    else if(accuracy >= 30){
        result = "⚪ NORMAL" + bonusText;
        distance = 80 * bonusMultiplier;
    }
    else{
        result = "❌ MISS";
        distance = 0; // 미스는 보너스 없음
    }

    distance = Math.round(distance * (accuracy / 100));

    document.getElementById("result").innerHTML = result + "<br>" + distance + "m";

    let ball = document.getElementById("ball");
    ball.className = "";
    void ball.offsetWidth;

    if(result.includes("PERFECT")) ball.classList.add("perfect");
    else if(result.includes("GREAT")) ball.classList.add("great");
    else if(result.includes("GOOD")) ball.classList.add("good");
    else if(result.includes("NORMAL")) ball.classList.add("normal");
    else ball.classList.add("miss");

    save(distance);

    gameState = "ready";
    updateUI();
}

function save(distance){
    if(distance > todayBest){
        todayBest = distance;
        localStorage.setItem("today", todayBest);
    }

    if(distance > monthBest){
        monthBest = distance;
        localStorage.setItem("month", monthBest);
    }

    dailyDistance += distance;
    localStorage.setItem("dailyDistance", dailyDistance);

    document.getElementById("today").innerText = todayBest;
    document.getElementById("month").innerText = monthBest;
    document.getElementById("daily").innerText = dailyDistance;
}
</script>

</body>
</html>
