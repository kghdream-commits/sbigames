<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Kick Challenge</title>

<style>
body {
    text-align: center;
    font-family: 'Malgun Gothic', sans-serif;
    background: #1a1a2e;
    color: #fff;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #e43f5a;
}

.box {
    width: 90%;
    max-width: 420px;
    margin: auto;
    background: #162447;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    border: 1px solid #0f4c75;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #e43f5a;
    color: white;
    font-weight: bold;
    font-size: 1rem;
}

button:active {
    background: #b22c44;
}

button:disabled {
    background: #555;
    cursor: not-allowed;
}

input[type="number"] {
    width: 50%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #0f4c75;
    background: #1a1a2e;
    color: white;
    font-size: 1rem;
    text-align: center;
}

/* ===================================================
   🎯 과녁 중심 상하/좌우 복합 조준 시스템
   =================================================== */
.center-target-wrapper {
    position: relative;
    width: 240px;
    height: 240px;
    margin: 25px auto;
    background: #1a1a2e;
    border-radius: 20px;
    border: 3px solid #0f4c75;
    box-shadow: 0 0 20px rgba(15, 76, 117, 0.5);
}

/* 🎆 폭죽 이펙트용 캔버스 레이어 */
#fx-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
}

/* ⚡ PERFECT 팝업 텍스트 스타일 */
#perfect-popup {
    position: absolute;
    width: 100%;
    top: 35%;
    left: 0;
    font-size: 32px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 10px #ff4757, 0 0 20px #ff4757, 0 0 30px #ffd700;
    z-index: 4;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.3);
    font-family: 'Arial Black', sans-serif;
}

/* 파동 애니메이션 효과 */
@keyframes pop-bounce {
    0% { opacity: 0; transform: scale(0.3) rotate(-10deg); }
    50% { opacity: 1; transform: scale(1.3) rotate(5deg); }
    70% { transform: scale(0.9) rotate(-3deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

#target {
    position: absolute;
    width: 100%;
    height: 100%;
    left: 0;
    top: 0;
    font-size: 110px;
    line-height: 240px;
    text-align: center;
    z-index: 1;
    user-select: none;
    transition: transform 0.2s;
}

.gauge-v-track {
    position: absolute;
    left: 10px;
    top: 20px;
    width: 12px;
    height: 200px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    z-index: 2;
}
.gauge-v-center-line {
    position: absolute;
    top: 45%;
    width: 100%;
    height: 10%;
    background: #ffd700;
}
.gauge-v-pointer {
    position: absolute;
    left: -2px;
    top: 0px;
    width: 16px;
    height: 10px;
    background: #ff4757;
    border-radius: 3px;
    box-shadow: 0 0 8px #ff4757;
}

.gauge-h-track {
    position: absolute;
    left: 40px;
    bottom: 15px;
    width: 180px;
    height: 12px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    z-index: 2;
}
.gauge-h-center-line {
    position: absolute;
    left: 45%;
    width: 10%;
    height: 100%;
    background: #ffd700;
}
.gauge-h-pointer {
    position: absolute;
    left: 0px;
    top: -2px;
    width: 10px;
    height: 16px;
    background: #00d2d3;
    border-radius: 3px;
    box-shadow: 0 0 8px #00d2d3;
}

#ball {
    font-size: 45px;
    margin: 10px 0;
}

.record {
    background: #1f4068;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
}

.status-msg {
    color: #ffd700;
    font-weight: bold;
    margin: 10px 0;
    font-size: 1.05rem;
    min-height: 24px;
}

.shoot-action-btn {
    width: 85%;
    padding: 15px;
    font-size: 1.1rem;
    margin: 10px 0;
    border-radius: 12px;
}

#btn-reset {
    background: #2ed573;
    width: 85%;
    padding: 15px;
    margin: 10px 0;
    font-size: 1.1rem;
    border-radius: 12px;
}
</style>
</head>

<body>

<h1>🏃⚽ Run Kick Challenge</h1>

<div class="box">
    <h3 id="level">난이도 : EASY</h3>

    <h3>러닝 거리 입력</h3>
    <input id="km" type="number" placeholder="km 입력" min="1">
    <button onclick="getTicket()">받기</button>
    
    <h3 id="ticket-view" style="color: #4cd137; margin: 15px 0 5px 0;">보유권 : 0</h3>
    <p id="shoot-count-view" style="font-size: 0.9rem; color: #a4b0be; margin: 5px 0;">오늘의 누적 슈팅 횟수: 0회</p>

    <hr style="border: 0; border-top: 1px solid #0f4c75; margin: 15px 0;">

    <h4 id="game-status" class="status-msg">거리를 입력해 슈팅권을 얻으세요!</h4>
    
    <button id="main-shoot-btn" class="shoot-action-btn" onclick="handleShootClick()" disabled>게임 시작 불가</button>
    <button id="btn-reset" onclick="resetToReady()" style="display: none;">🎮 재시도 (다음 슈팅 준비)</button>

    <div class="center-target-wrapper">
        <div id="target">🎯</div>
        
        <canvas id="fx-canvas" width="240" height="240"></canvas>
        <div id="perfect-popup">PERFECT!!</div>

        <div class="gauge-v-track">
            <div class="gauge-v-center-line"></div>
            <div id="power-bar" class="gauge-v-pointer"></div>
        </div>

        <div class="gauge-h-track">
            <div class="gauge-h-center-line"></div>
            <div id="direction-bar" class="gauge-h-pointer"></div>
        </div>
    </div>

    <div id="ball">⚽</div>

    <h2 id="result" style="color: #ff4757; min-height: 60px; margin: 10px 0;"></h2>

    <div class="record">
        <p>오늘 BEST : <span id="today">0</span>m</p>
        <p>월간 BEST : <span id="month">0</span>m</p>
        <p>누적 거리 : <span id="daily">0</span>m</p>
    </div>
</div>

<script>
let ticket = 0;
let gameState = "ready"; 
let savedPowerAccuracy = 0;

let todayShootCount = Number(localStorage.getItem("todayShootCount")) || 0;
let todayBest = Number(localStorage.getItem("today")) || 0;
let monthBest = Number(localStorage.getItem("month")) || 0;
let dailyDistance = Number(localStorage.getItem("dailyDistance")) || 0;

let vImgPos = 0; let vImgDir = 2;
let hImgPos = 0; let hImgDir = 2;
let vInterval = null; let hInterval = null;
let currentSpeed = 2;

// 🎆 폭죽 파티클 제어용 엔진 변수
const canvas = document.getElementById("fx-canvas");
const ctx = canvas.getContext("2d");
let particles = [];
let animationFrameId = null;

document.getElementById("today").innerText = todayBest;
document.getElementById("month").innerText = monthBest;
document.getElementById("daily").innerText = dailyDistance;
document.getElementById("shoot-count-view").innerText = "오늘의 누적 슈팅 횟수: " + todayShootCount + "회";

function getTicket() {
    let kmInput = document.getElementById("km").value;
    let km = Math.floor(Number(kmInput));

    if (!kmInput || km < 1) {
        alert("1km 이상의 올바른 숫자를 입력하세요.");
        return;
    }

    ticket += km;
    alert("🎉 성공! " + km + "km를 입력하여 " + km + "개의 슈팅권을 획득했습니다.");
    document.getElementById("km").value = "";
    
    if (gameState === "ready") {
        refreshGameSystem();
    } else {
        document.getElementById("ticket-view").innerText = "보유권 : " + ticket;
    }
}

function handleShootClick() {
    if (gameState === "phase1") stopPhase1();
    else if (gameState === "phase2") stopPhase2();
}

function refreshGameSystem() {
    document.getElementById("ticket-view").innerText = "보유권 : " + ticket;
    document.getElementById("shoot-count-view").innerText = "오늘의 누적 슈팅 횟수: " + todayShootCount + "회";
    
    let mainBtn = document.getElementById("main-shoot-btn");
    let statusMsg = document.getElementById("game-status");
    let resetBtn = document.getElementById("btn-reset");

    if (gameState === "ready") {
        resetBtn.style.display = "none";
        if (ticket > 0) {
            gameState = "phase1";
            mainBtn.style.display = "inline-block";
            mainBtn.disabled = false;
            mainBtn.innerText = "지금이다! 상하 멈춰!";
            mainBtn.style.background = "#e43f5a";
            statusMsg.innerText = "1단계: 과녁 옆의 [상하 게이지]가 움직입니다! 정중앙 노란칸에 맞추세요!";
            startVerticalLoop();
        } else {
            mainBtn.style.display = "inline-block";
            mainBtn.disabled = true;
            mainBtn.innerText = "슈팅권 없음";
            mainBtn.style.background = "#555";
            statusMsg.innerText = "거리를 입력해 슈팅권을 먼저 얻으세요!";
        }
    }
}

function startVerticalLoop() {
    clearInterval(vInterval); vImgPos = 0;
    
    if (dailyDistance > 1500) { currentSpeed = 5; document.getElementById("level").innerText = "난이도 : HARD"; }
    else if (dailyDistance > 500) { currentSpeed = 3.5; document.getElementById("level").innerText = "난이도 : NORMAL"; }
    else { currentSpeed = 2; document.getElementById("level").innerText = "난이도 : EASY"; }
    
    vImgDir = currentSpeed;
    vInterval = setInterval(() => {
        vImgPos += vImgDir;
        if (vImgPos >= 190 || vImgPos <= 0) vImgDir *= -1;
        document.getElementById("power-bar").style.top = vImgPos + "px";
    }, 15);
}

function stopPhase1() {
    clearInterval(vInterval);
    let diff = Math.abs(95 - vImgPos);
    let accuracy = 100 - (diff * 1.05);
    savedPowerAccuracy = accuracy < 0 ? 0 : accuracy;

    gameState = "phase2";
    let mainBtn = document.getElementById("main-shoot-btn");
    let statusMsg = document.getElementById("game-status");

    mainBtn.innerText = "🎯 최종 슛!!";
    mainBtn.style.background = "#00d2d3";
    statusMsg.innerText = "2단계: 과녁 밑의 [좌우 게이지]가 움직입니다! 골든 타이밍에 맞춰 슛을 날리세요!";
    
    startHorizontalLoop();
}

function startHorizontalLoop() {
    clearInterval(hInterval); hImgPos = 0; hImgDir = currentSpeed;
    hInterval = setInterval(() => {
        hImgPos += hImgDir;
        if (hImgPos >= 170 || hImgPos <= 0) hImgDir *= -1;
        document.getElementById("direction-bar").style.left = hImgPos + "px";
    }, 15);
}

function stopPhase2() {
    clearInterval(hInterval); 
    
    ticket--;
    todayShootCount++;
    localStorage.setItem("todayShootCount", todayShootCount);

    let diff = Math.abs(85 - hImgPos);
    let directionAccuracy = 100 - (diff * 1.15);
    if (directionAccuracy < 0) directionAccuracy = 0;

    let finalAccuracy = (savedPowerAccuracy + directionAccuracy) / 2;
    
    let perfectLimit = 90;
    let scaleVal = 1;
    if (dailyDistance > 1500) { perfectLimit = 95; scaleVal = 0.6; }
    else if (dailyDistance > 500) { perfectLimit = 92; scaleVal = 0.8; }
    
    document.getElementById("target").style.transform = "scale(" + scaleVal + ")";

    let resultText = ""; let baseDist = 0; let bonusMult = 1; let bonusText = "";

    if (todayShootCount % 5 === 0) {
        if (todayShootCount % 10 === 0) { bonusMult = 1.5; bonusText = " 🥇[골든슛 1.5배!]"; }
        else { bonusMult = 1.25; bonusText = " 🥈[실버슛 1.25배!]"; }
    }

    // ⭐ PERFECT 달성 시 연출 작동 트리거
    if (finalAccuracy >= perfectLimit) { 
        resultText = "🎯 PERFECT" + bonusText; 
        baseDist = 300; 
        triggerPerfectVisualEffects(); // 🎇 화려한 특수효과 발사!
    }
    else if (finalAccuracy >= 75) { resultText = "🟠 GREAT" + bonusText; baseDist = 230; }
    else if (finalAccuracy >= 55) { resultText = "🟡 GOOD" + bonusText; baseDist = 170; }
    else if (finalAccuracy >= 30) { resultText = "⚪ NORMAL" + bonusText; baseDist = 80; }
    else { resultText = "❌ MISS"; baseDist = 0; }

    let finalDistance = Math.round((baseDist * bonusMult) * (finalAccuracy / 100));
    document.getElementById("result").innerHTML = resultText + "<br>" + finalDistance + "m";

    saveScores(finalDistance);

    gameState = "result";
    let mainBtn = document.getElementById("main-shoot-btn");
    let statusMsg = document.getElementById("game-status");
    let resetBtn = document.getElementById("btn-reset");

    mainBtn.style.display = "none";
    
    if (ticket > 0) {
        resetBtn.style.display = "inline-block";
        statusMsg.innerText = "슛 완료! 위의 초록색 [재시도] 버튼을 누르면 다음 슛이 세팅됩니다.";
    } else {
        resetBtn.style.display = "none";
        statusMsg.innerText = "슈팅권을 모두 썼습니다. 거리를 새로 입력하세요!";
    }
    
    document.getElementById("ticket-view").innerText = "보유권 : " + ticket;
}

// 🎆 폭죽 파티클 스크립트 엔진
function triggerPerfectVisualEffects() {
    // 1. 글자 팝업 띄우기
    const popup = document.getElementById("perfect-popup");
    popup.style.animation = "none";
    popup.offsetHeight; // 트리거 리셋 리플로우
    popup.style.animation = "pop-bounce 0.8s forwards";

    // 2. 폭죽 파티클 생성기 (색상 다양화)
    particles = [];
    const colors = ["#ffd700", "#ff4757", "#00d2d3", "#10ac84", "#ff9f43", "#a55eea"];
    
    for (let i = 0; i < 60; i++) {
        particles.push({
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: Math.random() * 3 + 2,
            color: colors[Math.floor(Math.random() * colors.length)],
            speed: Math.random() * 5 + 2,
            angle: Math.random() * Math.PI * 2,
            alpha: 1,
            decay: Math.random() * 0.015 + 0.01
        });
    }
    
    cancelAnimationFrame(animationFrameId);
    animateParticles();
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;

    particles.forEach(p => {
        if (p.alpha > 0) {
            alive = true;
            p.x += Math.cos(p.angle) * p.speed;
            p.y += Math.sin(p.angle) * p.speed + 0.3; // 중력 효과 살짝 추가
            p.alpha -= p.decay;

            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 6;
            ctx.shadowColor = p.color;
            ctx.fill();
            ctx.restore();
        }
    });

    if (alive) {
        animationFrameId = requestAnimationFrame(animateParticles);
    } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
}

function resetToReady() {
    document.getElementById("result").innerHTML = "";
    document.getElementById("power-bar").style.top = "0px";
    document.getElementById("direction-bar").style.left = "0px";
    document.getElementById("target").style.transform = "scale(1)";
    
    // 이펙트 찌꺼기 청소
    document.getElementById("perfect-popup").style.opacity = "0";
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    gameState = "ready";
    refreshGameSystem();
}

function saveScores(dist) {
    if (dist > todayBest) { todayBest = dist; localStorage.setItem("today", todayBest); }
    if (dist > monthBest) { monthBest = dist; localStorage.setItem("month", monthBest); }
    dailyDistance += dist; localStorage.setItem("dailyDistance", dailyDistance);

    document.getElementById("today").innerText = todayBest;
    document.getElementById("month").innerText = monthBest;
    document.getElementById("daily").innerText = dailyDistance;
}

refreshGameSystem();
</script>

</body>
</html>
