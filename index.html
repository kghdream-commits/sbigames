<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Swing Game</title>

<style>

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
background:#111827;
color:white;
font-family:'Malgun Gothic',sans-serif;
text-align:center;
overflow:hidden;
}

h1{
color:#ffd700;
text-shadow:0 0 15px #ffd700;
margin:10px 0;
}

.field{
position:relative;
height:420px;
width:95%;
max-width:430px;
margin:auto;
border-radius:25px;
overflow:hidden;
background:linear-gradient(#1b2a3a,#0b1220);
}

/* BALL */
#ball{
position:absolute;
width:14px;
height:14px;
border-radius:50%;
background:white;
box-shadow:0 0 10px white;
left:50%;
top:0;
transform:translateX(-50%);
}

/* BATTER */
#batter{
position:absolute;
bottom:20px;
left:50%;
width:120px;
max-width:120px;
transform:translateX(-50%);
z-index:5;
}

/* fallback (이미지 깨질 때 표시) */
#batter::after{
content:"";
display:block;
width:60px;
height:100px;
background:#444;
border-radius:10px;
margin:auto;
}

/* BAT */
#bat{
position:absolute;
bottom:70px;
left:55%;
width:10px;
height:80px;
background:#caa472;
transform-origin: bottom center;
transform: translateX(-50%) rotate(0deg);
z-index:10;
}

.swing{
animation: swingAnim 0.35s ease-out;
}

@keyframes swingAnim{
0%{transform: translateX(-50%) rotate(0deg);}
40%{transform: translateX(-50%) rotate(-65deg);}
100%{transform: translateX(-50%) rotate(25deg);}
}

/* UI */
.result{
margin-top:10px;
font-size:20px;
color:#ffd700;
}

.scoreboard{
margin-top:5px;
font-size:14px;
color:white;
}

/* BUTTON */
button{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
padding:14px;
border:0;
border-radius:15px;
background:#e43f5a;
color:white;
font-size:18px;
}

</style>
</head>

<body>

<h1>⚾ SWING BASEBALL</h1>

<div class="field">

<div id="ball"></div>

<!-- ⚾ 타자 이미지 -->
<img id="batter" src="batter.png" onerror="this.style.display='none'">

<!-- 🪵 배트 -->
<div id="bat"></div>

<button onclick="action()" id="btn">START</button>

</div>

<div class="result" id="result">READY</div>

<div class="scoreboard">
🎯 SCORE: <span id="score">0</span> |
🏆 BEST: <span id="best">0</span> |
❤️ LIFE: <span id="life">10</span> |
🔥 COMBO: <span id="combo">0</span>
</div>

<script>

let state="ready";

let ballY=0;
let ballTimer;

let score=0;
let best=Number(localStorage.getItem("best"))||0;
let life=10;
let combo=0;

/* INIT */
document.getElementById("best").innerText=best;

/* START */
function start(){

state="pitch";

ballY=0;
document.getElementById("ball").style.top="0px";

ballTimer=setInterval(()=>{

ballY += 4;
document.getElementById("ball").style.top = ballY + "px";

if(ballY > 360){
clearInterval(ballTimer);
miss();
}

},16);

document.getElementById("btn").innerText="SWING";

}

/* ACTION */
function action(){

if(state==="ready"){
start();
return;
}

if(state==="pitch"){
state="swing";

let bat=document.getElementById("bat");
bat.classList.remove("swing");
void bat.offsetWidth;
bat.classList.add("swing");

setTimeout(()=>{
judge();
state="end";
document.getElementById("btn").innerText="RETRY";
},150);

}

if(state==="end"){
resetGame();
start();
}

}

/* JUDGE */
function judge(){

let r=Math.random();
let result="";
let gain=0;

if(r>0.75){
result="🔥 HOME RUN";
gain=300;
combo++;
}
else if(r>0.45){
result="💥 HIT";
gain=150;
combo=0;
}
else{
result="❌ MISS";
gain=0;
combo=0;
life--;
}

score += gain;

document.getElementById("result").innerText=result;
document.getElementById("score").innerText=score;
document.getElementById("life").innerText=life;
document.getElementById("combo").innerText=combo;

if(life<=0){
alert("GAME OVER");
location.reload();
}

}

/* MISS */
function miss(){
life--;
combo=0;
document.getElementById("result").innerText="❌ MISS";
document.getElementById("life").innerText=life;
state="end";
document.getElementById("btn").innerText="RETRY";
}

function resetGame(){
state="ready";
document.getElementById("btn").innerText="START";
document.getElementById("result").innerText="READY";
}

</script>

</body>
</html>
