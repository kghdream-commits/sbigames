<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Swing Game</title>

<style>

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
background:#111827;
color:white;
font-family:'Malgun Gothic',sans-serif;
text-align:center;
overflow:hidden;
}

h1{
color:#ffd700;
text-shadow:0 0 15px #ffd700;
margin:10px 0;
}

/* FIELD */
.field{
position:relative;
height:420px;
width:95%;
max-width:430px;
margin:auto;
border-radius:25px;
overflow:hidden;
background:url("ground.png") center/cover;
}

/* BALL */
#ball{
position:absolute;
width:14px;
height:14px;
border-radius:50%;
background:white;
box-shadow:0 0 10px white;
left:50%;
top:0;
transform:translateX(-50%);
}

/* BAT */
#bat{
position:absolute;
bottom:20px;
left:50%;
width:120px;
transform-origin: bottom center;
transform: translateX(-50%) rotate(0deg);
}

.swing{
animation: swingAnim 0.35s ease-out;
}

@keyframes swingAnim{
0%{transform: translateX(-50%) rotate(0deg);}
40%{transform: translateX(-50%) rotate(-65deg);}
100%{transform: translateX(-50%) rotate(25deg);}
}

/* UI */
.result{
margin-top:10px;
font-size:20px;
color:#ffd700;
}

.scoreboard{
margin-top:5px;
font-size:14px;
color:white;
}

button{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
padding:14px;
border:0;
border-radius:15px;
background:#e43f5a;
color:white;
font-size:18px;
}

.shake{
animation:shake .25s;
}

@keyframes shake{
0%{transform:translate(0);}
25%{transform:translate(8px,-6px);}
50%{transform:translate(-8px,6px);}
75%{transform:translate(6px,3px);}
100%{transform:translate(0);}
}

</style>
</head>

<body>

<h1>⚾ SWING BASEBALL</h1>

<div class="field">

<div id="ball"></div>

<!-- 배트 이미지 -->
<img id="bat" src="bat.png">

<button onclick="action()" id="btn">START</button>

</div>

<div class="result" id="result">READY</div>

<div class="scoreboard">
🎯 SCORE: <span id="score">0</span> |
🏆 BEST: <span id="best">0</span> |
❤️ LIFE: <span id="life">10</span> |
🔥 COMBO: <span id="combo">0</span>
</div>

<script>

/* STATE */
let state="ready";

/* BALL */
let ballY=0;
let ballTimer;

/* GAME DATA */
let score=0;
let best=Number(localStorage.getItem("best"))||0;
let life=10;
let combo=0;

/* INIT */
function init(){
document.getElementById("best").innerText=best;
document.getElementById("score").innerText=score;
document.getElementById("life").innerText=life;
}
init();

/* START PITCH */
function start(){

state="pitch";

ballY=0;

let ball=document.getElementById("ball");
ball.style.top="0px";

ballTimer=setInterval(()=>{

ballY += 4;
ball.style.top = ballY + "px";

if(ballY > 360){
clearInterval(ballTimer);
miss();
}

},16);

document.getElementById("btn").innerText="SWING";

}

/* ACTION */
function action(){

if(state==="ready"){
start();
return;
}

/* SWING */
if(state==="pitch"){
state="swing";

/* bat animation */
let bat=document.getElementById("bat");
bat.classList.remove("swing");
void bat.offsetWidth;
bat.classList.add("swing");

/* timing window */
setTimeout(()=>{
judge();
state="end";
document.getElementById("btn").innerText="RETRY";
},150);

}

if(state==="end"){
resetGame();
start();
}

}

/* JUDGE */
function judge(){

let result="";
let gain=0;

/* 타이밍 기반 랜덤 보정 */
let r=Math.random();

/* good timing = hit chance */
if(r>0.75){
result="🔥 HOME RUN";
gain=300;
combo++;
homeFX();
}
else if(r>0.45){
result="💥 HIT";
gain=150;
combo=0;
}
else{
result="❌ MISS";
gain=0;
combo=0;
life--;
}

score += gain;

/* BEST */
if(score>best){
best=score;
localStorage.setItem("best",best);
}

updateUI(result);

}

/* MISS (timeout) */
function miss(){
life--;
combo=0;
updateUI("❌ MISS");
state="end";
document.getElementById("btn").innerText="RETRY";
}

/* RESET */
function resetGame(){
state="ready";
document.getElementById("btn").innerText="START";
document.getElementById("result").innerText="READY";
}

/* UI */
function updateUI(result){

document.getElementById("result").innerText=result;
document.getElementById("score").innerText=score;
document.getElementById("best").innerText=best;
document.getElementById("life").innerText=life;
document.getElementById("combo").innerText=combo;

/* GAME OVER */
if(life<=0){
setTimeout(()=>{
alert("GAME OVER");
location.reload();
},300);
}

}

/* HOME RUN FX */
function homeFX(){

let field=document.querySelector(".field");
field.classList.add("shake");

setTimeout(()=>{
field.classList.remove("shake");
},300);

}

</script>

</body>
</html>
