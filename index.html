<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Kick Challenge</title>

<style>
body{
    text-align:center;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background:#1a1a2e;
    color: #fff;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #e43f5a;
}

.box{
    width:90%;
    max-width:420px;
    margin:auto;
    background:#162447;
    padding:20px;
    border-radius:20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    border: 1px solid #0f4c75;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background: #e43f5a;
    color: white;
    font-weight: bold;
    font-size: 1rem;
}

button:active {
    background: #b22c44;
}

button:disabled {
    background: #555;
    cursor: not-allowed;
}

input[type="number"]{
    width:60%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #0f4c75;
    background: #1a1a2e;
    color: white;
    font-size: 1rem;
    text-align: center;
}

#target{
    font-size:90px;
    margin:20px 0;
    transition:0.3s;
}

#ball{
    font-size:50px;
    margin:10px 0;
}

.control-section {
    background: #1f4068;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    border: 1px solid #0f4c75;
}

.control-section.disabled {
    opacity: 0.3;
    pointer-events: none;
}

/* 움직이는 게이지 스타일 */
.gauge-container {
    width: 80%;
    height: 20px;
    background: #1a1a2e;
    margin: 15px auto;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    border: 2px solid #0f4c75;
}

.gauge-center {
    position: absolute;
    left: 45%;
    width: 10%;
    height: 100%;
    background: #ffd700; /* 정중앙 골드 구역 */
}

.gauge-bar {
    position: absolute;
    left: 0;
    top: 0;
    width: 8px;
    height: 100%;
    background: #e43f5a;
    box-shadow: 0 0 8px #ff4757;
}

.record{
    background:#1f4068;
    padding:15px;
    margin-top:30px;
    border-radius: 10px;
}

.home-btn {
    display: inline-block;
    margin-top: 20px;
    color: #b2bec3;
    text-decoration: none;
    font-size: 0.9rem;
    border-bottom: 1px solid #b2bec3;
    padding-bottom: 2px;
}

.status-msg {
    color: #ffd700;
    font-weight: bold;
    margin: 10px 0;
    min-height: 24px;
}

.bonus-badge {
    background: #ff4757;
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 0.85rem;
    display: inline-block;
    margin-bottom: 5px;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>🏃⚽ Run Kick Challenge</h1>

<div class="box">

<h3 id="level">난이도 : EASY</h3>

<h3>러닝 거리 입력</h3>
<input id="km" type="number" placeholder="km 입력" min="1">
<button onclick="getTicket()">받기</button>
<p id="ticket">보유권 : 0</p>
<p id="shoot-count-view" style="font-size: 0.9rem; color: #a4b0be;">오늘의 누적 슈팅 횟수: 0회</p>

<hr style="border: 0; border-top: 1px solid #0f4c75;">

<h4 id="game-status" class="status-msg">거리를 입력해 슈팅권을 얻으세요!</h4>

<div id="section-power" class="control-section disabled">
    <div id="bonus-info" class="bonus-badge" style="display:none;">특수 슛 조준 중!</div><br>
    <strong>[1단계] 상하 타이밍 맞추기</strong><br>
    <div class="gauge-container">
        <div class="gauge-center"></div>
        <div id="power-bar" class="gauge-bar"></div>
    </div>
    <button id="btn-power" onclick="lockPower()">지금이다! 멈춰!</button>
</div>

<div id="section-direction" class="control-section disabled">
    <strong>[2단계] 좌우 타이밍 맞추기</strong><br>
    <div class="gauge-container">
        <div class="gauge-center"></div>
        <div id="direction-bar" class="gauge-bar"></div>
    </div>
    <button id="btn-direction" onclick="kick()">최종 슛!!</button>
</div>

<div id="target">🎯</div>
<div id="ball">⚽</div>

<h2 id="result"></h2>

<div class="record">
<p>오늘 BEST : <span id="today">0</span>m</p>
<p>월간 BEST : <span id="month">0</span>m</p>
<p>누적 거리 : <span id="daily">0</span>m</p>
</div>

</div>

<a href="index.html" class="home-btn">← 홈화면으로 돌아가기</a>

<script>
let ticket = 0;
let gameState = "ready"; 
let savedPowerAccuracy = 0;
let todayShootCount = Number(localStorage.getItem("todayShootCount")) || 0; 

let todayBest = Number(localStorage.getItem("today")) || 0;
let monthBest = Number(localStorage.getItem("month")) || 0;
let dailyDistance = Number(localStorage.getItem("dailyDistance")) || 0;

// 게이지 타이밍용 변수
let powerPos = 0;
let powerDir = 1;
let directionPos = 0;
let directionDir = 1;
let powerInterval, directionInterval;
let gaugeSpeed = 3; // 숫자가 낮을수록 난이도가 쉬워지고 높을수록 바가 빨라집니다.

document.getElementById("today").innerText = todayBest;
document.getElementById("month").innerText = monthBest;
document.getElementById("daily").innerText = dailyDistance;
document.getElementById("shoot-count-view").innerText = "오늘의 누적 슈팅 횟수: " + todayShootCount + "회";

function checkNextShootBonus() {
    let nextShoot = todayShootCount + 1;
    const bonusInfo = document.getElementById("bonus-info");
    
    if (nextShoot > 0 && nextShoot % 5 === 0) {
        bonusInfo.style.display = "inline-block";
        if (nextShoot % 10 === 0) {
            bonusInfo.innerText = "🥇 다음 슛: 골든 슛! (보너스 거리 1.5배)";
            bonusInfo.style.background = "#ffa500";
        } else {
            bonusInfo.innerText = "🥈 다음 슛: 실버 슛! (보너스 거리 1.25배)";
            bonusInfo.style.background = "#a4b0be";
        }
    } else {
        bonusInfo.style.display = "none";
    }
}

function updateUI() {
    document.getElementById("ticket").innerText = "보유권 : " + ticket;
    document.getElementById("shoot-count-view").innerText = "오늘의 누적 슈팅 횟수: " + todayShootCount + "회";
    
    const secPower = document.getElementById("section-power");
    const secDirection = document.getElementById("section-direction");
    const statusMsg = document.getElementById("game-status");

    // 간격 초기화 (멈춤)
    clearInterval(powerInterval);
    clearInterval(directionInterval);

    if (ticket <= 0 && gameState === "ready") {
        secPower.classList.add("disabled");
        secDirection.classList.add("disabled");
        statusMsg.innerText = "거리를 입력해 슈팅권을 얻으세요!";
    } else if (gameState === "ready" && ticket > 0) {
        secPower.classList.remove("disabled");
        secDirection.classList.add("disabled");
        statusMsg.innerText = "상하 게이지가 움직입니다! 타이밍에 맞춰 버튼을 누르세요!";
        checkNextShootBonus();
        
        // 상하 바 자동 움직임 시작
        startPowerGauge();
    }
}

// 상하 바를 자동으로 움직이게 만드는 함수
function startPowerGauge() {
    powerPos = 0;
    powerDir = gaugeSpeed;
    powerInterval = setInterval(() => {
        powerPos += powerDir;
        if(powerPos >= 96 || powerPos <= 0) {
            powerDir *= -1; // 벽에 부딪히면 튕김
        }
        document.getElementById("power-bar").style.left = powerPos + "%";
    }, 15);
}

// 좌우 바를 자동으로 움직이게 만드는 함수
function startDirectionGauge() {
    directionPos = 0;
    directionDir = gaugeSpeed;
    directionInterval = setInterval(() => {
        directionPos += directionDir;
        if(directionPos >= 96 || directionPos <= 0) {
            directionDir *= -1; 
        }
        document.getElementById("direction-bar").style.left = directionPos + "%";
    }, 15);
}

function getTicket(){
    let kmInput = document.getElementById("km").value;
    let km = Math.floor(Number(kmInput));

    if(!kmInput || km < 1){
        alert("1km 이상 올바른 숫자를 입력하세요.");
        return;
    }

    ticket = ticket + km; 
    alert("🎉 성공! " + km + "km를 입력하여 " + km + "개의 슈팅 기회를 획득했습니다.");
    document.getElementById("km").value = "";

    if(gameState === "ready") {
        updateUI();
    } else {
        document.getElementById("ticket").innerText = "보유권 : " + ticket;
    }
}

// 1단계: 상하 멈추기
function lockPower() {
    if(ticket <= 0){
        alert("슈팅권이 없습니다.");
        gameState = "ready";
        updateUI();
        return;
    }

    clearInterval(powerInterval); // 상하 바 멈춤!
    
    // 48%~52% 부근이 정중앙(완벽)일 때 정확도 계산 (최대 100점)
    savedPowerAccuracy = 100 - Math.abs(50 - powerPos) * 2; 
    if(savedPowerAccuracy < 0) savedPowerAccuracy = 0;

    gameState = "direction_phase";
    document.getElementById("section-power").classList.add("disabled");
    document.getElementById("section-direction").classList.remove("disabled");
    document.getElementById("game-status").innerText = "좌우 게이지도 움직입니다! 골드 영역을 저격하세요!";
    
    // 2단계 좌우 움직임 시작
    startDirectionGauge();
}

// 2단계: 좌우 멈추고 최종 슛 날리기
function kick(){
    if(ticket <= 0){
        alert("슈팅권 없음");
        gameState = "ready";
        updateUI();
        return;
    }

    clearInterval(directionInterval); // 좌우 바 멈춤!

    ticket--;
    todayShootCount++; 
    localStorage.setItem("todayShootCount", todayShootCount);

    let perfectLimit = 90;
    let targetScale = 1;

    // 난이도 조절 및 바 이동 속도 세팅
    if(dailyDistance > 1500){
        perfectLimit = 95;
        targetScale = 0.6;
        gaugeSpeed = 5; // 속도 빨라짐
        document.getElementById("level").innerText = "난이도 : HARD";
    }
    else if(dailyDistance > 500){
        perfectLimit = 92;
        targetScale = 0.8;
        gaugeSpeed = 4;
        document.getElementById("level").innerText = "난이도 : NORMAL";
    }
    else{
        gaugeSpeed = 3;
        document.getElementById("level").innerText = "난이도 : EASY";
    }

    document.getElementById("target").style.transform = "scale(" + targetScale + ")";

    // 좌우 정확도 계산
    let directionAccuracy = 100 - Math.abs(50 - directionPos) * 2;
    if(directionAccuracy < 0) directionAccuracy = 0;

    // 최종 종합 정확도 계산
    let accuracy = (savedPowerAccuracy + directionAccuracy) / 2;

    let result;
    let distance;
    let bonusMultiplier = 1; 
    let bonusText = "";

    // 5회(실버), 10회(골든) 보너스 슛 시스템 적용
    if (todayShootCount % 5 === 0) {
        if (todayShootCount % 10 === 0) {
            bonusMultiplier = 1.5; 
            bonusText = " 🥇[골든슛 1.5배!!]";
        } else {
            bonusMultiplier = 1.25; 
            bonusText = " 🥈[실버슛 1.25배!!]";
        }
    }

    if(accuracy >= perfectLimit){
        result = "🎯 PERFECT" + bonusText;
        distance = 300 * bonusMultiplier;
    }
    else if(accuracy >= 75){
        result = "🟠 GREAT" + bonusText;
        distance = 230 * bonusMultiplier;
    }
    else if(accuracy >= 55){
        result = "🟡 GOOD" + bonusText;
        distance = 170 * bonusMultiplier;
    }
    else if(accuracy >= 30){
        result = "⚪ NORMAL" + bonusText;
        distance = 80 * bonusMultiplier;
    }
    else{
        result = "❌ MISS";
        distance = 0; 
    }

    distance = Math.round(distance * (accuracy / 100));
    document.getElementById("result").innerHTML = result + "<br>" + distance + "m";

    save(distance);

    // 잠시 결과 보여준 뒤 게임 리셋 대기
    gameState = "ready";
    setTimeout(() => {
        updateUI();
    }, 1500); // 1.5초 뒤 자동 다음 판 세팅
}

function save(distance){
    if(distance > todayBest){
        todayBest = distance;
        localStorage.setItem("today", todayBest);
    }

    if(distance > monthBest){
        monthBest = distance;
        localStorage.setItem("month", monthBest);
    }

    dailyDistance += distance;
    localStorage.setItem("dailyDistance", dailyDistance);

    document.getElementById("today").innerText = todayBest;
    document.getElementById("month").innerText = monthBest;
    document.getElementById("daily").innerText = dailyDistance;
}

// 게임 최초 세팅
updateUI();
</script>

</body>
</html>
