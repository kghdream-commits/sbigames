<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Kick Challenge - Pro</title>

<style>
body {
    text-align: center;
    font-family: 'Malgun Gothic', sans-serif;
    background: #1a1a2e;
    color: #fff;
    margin: 0;
    padding: 20px;
    user-select: none;
}

.box {
    width: 90%;
    max-width: 420px;
    margin: auto;
    background: #162447;
    padding: 20px;
    border-radius: 20px;
}

/* 버튼 */
button {
    width: 100%;
    margin: 8px 0;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    background: #e43f5a;
    color: white;
    box-shadow: 0 4px 0 #b22c44;
}

button:disabled {
    background: #555;
    box-shadow: none;
    opacity: 0.6;
    cursor: not-allowed;
}

#btn-reset {
    background: #2ed573;
}

/* 옵션 */
select, input {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

/* 게임 */
.center-target-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 20px auto;
    background: #111d35;
    border-radius: 20px;
    overflow: hidden;
    border: 3px solid #0f4c75;
}

#goal-frame {
    position: absolute;
    width: 200px;
    height: 140px;
    border: 5px solid #fff;
    left: 40px;
    top: 40px;
}

#keeper {
    position: absolute;
    left: 80px;
    top: 60px;
    font-size: 30px;
    transition: transform 0.5s ease;
}

#ball {
    font-size: 45px;
    position: relative;
    margin-top: 10px;
    transition: transform 0.7s cubic-bezier(0.2,0.8,0.2,1);
}

/* 게이지 */
.gauge-v-track { position:absolute; left:15px; top:20px; width:14px; height:240px; background:rgba(255,255,255,0.08); border-radius:7px;}
.gauge-v-pointer { position:absolute; left:-4px; width:22px; height:12px; background:#ff4757;}

.gauge-h-track { position:absolute; left:40px; bottom:15px; width:200px; height:14px; background:rgba(255,255,255,0.08);}
.gauge-h-pointer { position:absolute; width:12px; height:22px; background:#00d2d3;}

/* 흔들림 */
@keyframes shake {
    0%{transform:translateX(0)}
    25%{transform:translateX(-5px)}
    50%{transform:translateX(5px)}
    100%{transform:translateX(0)}
}
</style>
</head>

<body>

<h1>⚽ Run Kick Challenge PRO</h1>

<div class="box">

    <select id="difficulty">
        <option value="easy">🟢 Easy (키퍼 느림)</option>
        <option value="normal" selected>🟡 Normal</option>
        <option value="hard">🔴 Hard (키퍼 빠름)</option>
    </select>

    <input id="km" type="number" placeholder="권한 입력">

    <button onclick="getTicket()">권한 받기</button>

    <h3 id="ticket-view">보유권 : 0</h3>

    <button id="main-btn" onclick="action()" disabled>슛 준비</button>
    <button id="btn-reset" onclick="resetGame()" style="display:none;">다시하기</button>

    <div class="center-target-wrapper">
        <div id="goal-frame"></div>
        <div id="keeper">🧤</div>
        <div class="gauge-v-track"><div id="v-bar" class="gauge-v-pointer"></div></div>
        <div class="gauge-h-track"><div id="h-bar" class="gauge-h-pointer"></div></div>
    </div>

    <div id="ball">⚽</div>
    <h2 id="result"></h2>

</div>

<script>

let ticket = 0;
let state = "ready";
let v=0,h=0,vDir=4,hDir=4;
let vInt,hInt;

function getTicket(){
    ticket += Number(document.getElementById("km").value || 0);
    updateUI();
}

function updateUI(){
    document.getElementById("ticket-view").innerText = "보유권 : " + ticket;
    document.getElementById("main-btn").disabled = ticket <= 0;
}

function action(){

    if(ticket <= 0) return;

    if(state === "ready"){
        state="v";
        vInt=setInterval(()=>{
            v+=vDir;
            if(v>228||v<0)vDir*=-1;
            document.getElementById("v-bar").style.top=v+"px";
        },15);

        document.getElementById("main-btn").innerText="파워 고정";
    }

    else if(state==="v"){
        clearInterval(vInt);
        state="h";
        hInt=setInterval(()=>{
            h+=hDir;
            if(h>188||h<0)hDir*=-1;
            document.getElementById("h-bar").style.left=h+"px";
        },15);

        document.getElementById("main-btn").innerText="각도 고정";
    }

    else if(state==="h"){
        clearInterval(hInt);
        finish();
    }

    else resetGame();
}

/* ===== 핵심 ===== */
function finish(){

    ticket--;

    const PERFECT_V=114;
    const PERFECT_H=94;
    const T=10;

    let isPerfect =
        Math.abs(v-PERFECT_V)<T &&
        Math.abs(h-PERFECT_H)<T;

    let keeper=document.getElementById("keeper");
    let ball=document.getElementById("ball");

    let difficulty=document.getElementById("difficulty").value;
    let speed = difficulty==="easy"?0.7 : difficulty==="hard"?0.3 : 0.5;

    if(isPerfect){

        document.getElementById("result").innerText="🔥 PERFECT GOAL!";

        // 🧤 키퍼 다이브 (손 뻗음)
        keeper.style.transform="translateX(-50px) translateY(-20px) rotate(-40deg)";

        // ⚽ 손 스치고 골대 상단 흡입
        ball.style.transition=`transform ${speed}s cubic-bezier(0.2,0.8,0.2,1)`;
        ball.style.transform="translateY(-200px) translateX(15px) scale(0.25)";

        setTimeout(()=>{
            ball.style.transform="translateY(-240px) translateX(20px) scale(0.2)";
        },150);

        document.querySelector(".center-target-wrapper").style.animation="shake 0.3s";

    } else {

        document.getElementById("result").innerText="🧤 BLOCK!";

        keeper.style.transform="translateX(-20px) scale(1.2)";
        ball.style.transform="translateY(-40px) rotate(90deg)";
    }

    state="result";

    document.getElementById("btn-reset").style.display="block";
    document.getElementById("main-btn").style.display="none";

    updateUI();
}

function resetGame(){

    v=0;h=0;
    vDir=4;hDir=4;

    document.getElementById("v-bar").style.top="0px";
    document.getElementById("h-bar").style.left="0px";

    document.getElementById("ball").style.transform="none";
    document.getElementById("keeper").style.transform="none";

    document.getElementById("result").innerText="";

    document.getElementById("btn-reset").style.display="none";
    document.getElementById("main-btn").style.display="block";

    state="ready";

    updateUI();
}

</script>

</body>
</html>
