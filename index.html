<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Kick Challenge</title>

<style>
body {
    text-align: center;
    font-family: 'Malgun Gothic', sans-serif;
    background: #1a1a2e;
    color: #fff;
    margin: 0;
    padding: 20px;
    user-select: none;
}

h1 {
    color: #e43f5a;
}

/* 박스 */
.box {
    width: 90%;
    max-width: 420px;
    margin: auto;
    background: #162447;
    padding: 20px;
    border-radius: 20px;
}

/* 버튼 */
button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    background: #e43f5a;
    color: white;
}

button:disabled {
    background: #555;
}

/* 배지 */
#bonus-wrap {
    text-align: center;
    margin-bottom: 10px;
}
#bonus-tag {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 8px;
    font-weight: bold;
    background: #ffd700;
    color: #000;
}

/* ===== 골대 ===== */
.center-target-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 25px auto;
    background: #111d35;
    border-radius: 24px;
    border: 3px solid #0f4c75;
    overflow: hidden;
}

/* 🥅 골대 */
#goal {
    position: absolute;
    left: 80px;
    top: 70px;
    font-size: 110px;
}

/* 🧤 키퍼 */
#keeper {
    position: absolute;
    left: 90px;
    top: 90px;
    font-size: 30px;
    transition: transform 0.4s ease;
}

/* ⚽ 공 */
#ball {
    font-size: 45px;
    margin: 10px 0;
    transition: transform 0.8s cubic-bezier(0.2,0.8,0.2,1);
}

/* ===== 게이지 ===== */
.gauge-v-track {
    position:absolute;
    left:15px;
    top:20px;
    width:14px;
    height:240px;
    background:rgba(255,255,255,0.08);
    border-radius:7px;
}
.gauge-v-pointer {
    position:absolute;
    left:-4px;
    width:22px;
    height:12px;
    background:#ff4757;
}

.gauge-h-track {
    position:absolute;
    left:40px;
    bottom:15px;
    width:200px;
    height:14px;
    background:rgba(255,255,255,0.08);
}
.gauge-h-pointer {
    position:absolute;
    width:12px;
    height:22px;
    background:#00d2d3;
}

/* 🔥 불꽃슛 */
@keyframes fire {
    0% { filter: drop-shadow(0 0 5px orange); }
    50% { filter: drop-shadow(0 0 20px red); }
    100% { filter: drop-shadow(0 0 5px orange); }
}
</style>
</head>

<body>

<h1>⚽ Run Kick Challenge</h1>

<div class="box">

    <div id="bonus-wrap">
        <span id="bonus-tag">GOLD / SILVER SHOT</span>
    </div>

    <input id="km" type="number" placeholder="러닝 거리 (km)">
    <button onclick="getTicket()">러닝 → 슈팅권</button>

    <h3 id="ticket-view">보유권 : 0</h3>

    <button id="main-btn" onclick="action()" disabled>슛 준비</button>

    <!-- 🥅 골대 -->
    <div class="center-target-wrapper">

        <div id="goal">🥅</div>
        <div id="keeper">🧤</div>

        <div class="gauge-v-track">
            <div id="v-bar" class="gauge-v-pointer"></div>
        </div>

        <div class="gauge-h-track">
            <div id="h-bar" class="gauge-h-pointer"></div>
        </div>

    </div>

    <div id="ball">⚽</div>
    <h2 id="result"></h2>

</div>

<script>

let ticket = 0;
let state = "ready";

let v=0,h=0,vDir=4,hDir=4;
let vInt,hInt;

/* 러닝 → 슈팅권 */
function getTicket(){
    let km = Number(document.getElementById("km").value || 0);
    if(km <= 0) return;

    ticket += km;
    document.getElementById("ticket-view").innerText = "보유권 : " + ticket;
    document.getElementById("main-btn").disabled = ticket <= 0;
}

/* 액션 */
function action(){

    if(ticket <= 0) return;

    if(state === "ready"){
        state="v";

        vInt=setInterval(()=>{
            v+=vDir;
            if(v>228||v<0)vDir*=-1;
            document.getElementById("v-bar").style.top=v+"px";
        },15);

        document.getElementById("main-btn").innerText="파워 고정";
    }

    else if(state==="v"){
        clearInterval(vInt);
        state="h";

        hInt=setInterval(()=>{
            h+=hDir;
            if(h>188||h<0)hDir*=-1;
            document.getElementById("h-bar").style.left=h+"px";
        },15);

        document.getElementById("main-btn").innerText="각도 고정";
    }

    else if(state==="h"){
        clearInterval(hInt);
        shoot();
    }
}

/* 슈팅 */
function shoot(){

    ticket--;

    const PERFECT_V=114;
    const PERFECT_H=94;
    const T=10;

    let isPerfect =
        Math.abs(v-PERFECT_V)<T &&
        Math.abs(h-PERFECT_H)<T;

    let ball=document.getElementById("ball");
    let keeper=document.getElementById("keeper");
    let result=document.getElementById("result");

    // 공 발사
    ball.style.transform="translateY(-220px) scale(0.4)";

    if(isPerfect){

        result.innerText="🔥 PERFECT SHOT";

        // 키퍼 다이브
        keeper.style.transform="translateX(-50px) rotate(-35deg)";

        // 불꽃슛
        ball.style.animation="fire 0.5s infinite";

        setTimeout(()=>{
            ball.style.transform="translateY(-260px) scale(0.2)";
            ball.style.animation="none";
        },200);

    } else {

        result.innerText="⚽ SHOT";

        keeper.style.transform="translateX(-20px) scale(1.2)";
    }

    state="result";
    document.getElementById("main-btn").innerText="재시작";
}

</script>

</body>
</html>
