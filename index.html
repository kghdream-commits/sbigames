<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Kick Challenge</title>

<style>
body {
    text-align: center;
    font-family: 'Malgun Gothic', sans-serif;
    background: #1a1a2e;
    color: #fff;
    margin: 0;
    padding: 20px;
    user-select: none;
}

h1 {
    color: #e43f5a;
    text-shadow: 0 0 10px rgba(228, 63, 90, 0.5);
}

.box {
    width: 90%;
    max-width: 420px;
    margin: auto;
    background: #162447;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    border: 1px solid #0f4c75;
}

/* 버튼 */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #e43f5a;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    box-shadow: 0 5px 0 #b22c44, 0 8px 15px rgba(0,0,0,0.3);
    transition: all 0.1s ease;
}

button:active {
    transform: translateY(4px);
}

/* 타겟 */
.center-target-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 25px auto;
    background: #111d35;
    border-radius: 24px;
    border: 3px solid #0f4c75;
    overflow: hidden;
}

#target {
    position: absolute;
    width: 120px;
    height: 120px;
    left: 80px;
    top: 80px;
    font-size: 110px;
    z-index: 1;
}

/* 게이지 (그대로 유지) */
.gauge-v-track {
    position: absolute;
    left: 15px;
    top: 20px;
    width: 14px;
    height: 240px;
    background: rgba(255,255,255,0.08);
    border-radius: 7px;
}

.gauge-v-pointer {
    position: absolute;
    width: 22px;
    height: 12px;
    background: #ff4757;
}

.gauge-h-track {
    position: absolute;
    left: 40px;
    bottom: 15px;
    width: 200px;
    height: 14px;
    background: rgba(255,255,255,0.08);
    border-radius: 7px;
}

.gauge-h-pointer {
    position: absolute;
    width: 12px;
    height: 22px;
    background: #00d2d3;
}
</style>
</head>

<body>

<h1>🏃⚽ Run Kick Challenge</h1>

<div class="box">

    <h3>
        <span id="bonus-tag"></span>
    </h3>

    <h3>러닝 거리 입력</h3>
    <input id="km" type="number" placeholder="km 입력" min="1">
    <button onclick="getTicket()">받기</button>

    <h3 id="ticket-view">보유권 : 0</h3>

    <button id="main-shoot-btn" onclick="handleShootClick()" disabled>슈팅권 없음</button>

    <div id="target-wrapper" class="center-target-wrapper">

        <!-- ✅ 여기만 변경 -->
        <img id="target" src="goal.png" alt="goal">

        <div class="gauge-v-track">
            <div id="power-bar" class="gauge-v-pointer"></div>
        </div>

        <div class="gauge-h-track">
            <div id="direction-bar" class="gauge-h-pointer"></div>
        </div>

    </div>

    <h2 id="result"></h2>

</div>

<script>
// 기존 JS 그대로 유지 (절대 수정 없음)
let ticket = 0;
let gameState = "ready";

let vImgPos = 0;
let vImgDir = 2;
let hImgPos = 0;
let hImgDir = 2;

let vInterval;
let hInterval;

window.onload = function () {
    refreshGameSystem();
};

function getTicket() {
    let km = Number(document.getElementById("km").value);
    if (!km || km < 1) return alert("1km 이상 입력");
    ticket += km;
    document.getElementById("km").value = "";
    refreshGameSystem();
}

function handleShootClick() {
    if (gameState === "phase1") stopPhase1();
    else if (gameState === "phase2") stopPhase2();
}

function refreshGameSystem() {
    document.getElementById("ticket-view").innerText = "보유권 : " + ticket;

    let btn = document.getElementById("main-shoot-btn");

    if (ticket > 0) {
        btn.disabled = false;
        btn.innerText = "슈팅 시작";
        gameState = "phase1";
        startVertical();
    } else {
        btn.disabled = true;
        btn.innerText = "슈팅권 없음";
    }
}

function startVertical() {
    clearInterval(vInterval);
    vImgPos = 0;
    vImgDir = 2;

    vInterval = setInterval(() => {
        vImgPos += vImgDir;
        if (vImgPos > 220 || vImgPos < 0) vImgDir *= -1;
        document.getElementById("power-bar").style.top = vImgPos + "px";
    }, 15);
}

function stopPhase1() {
    clearInterval(vInterval);
    gameState = "phase2";
    startHorizontal();
}

function startHorizontal() {
    clearInterval(hInterval);
    hImgPos = 0;
    hImgDir = 2;

    hInterval = setInterval(() => {
        hImgPos += hImgDir;
        if (hImgPos > 180 || hImgPos < 0) hImgDir *= -1;
        document.getElementById("direction-bar").style.left = hImgPos + "px";
    }, 15);
}

function stopPhase2() {
    clearInterval(hInterval);

    ticket--;

    let power = 100 - Math.abs(110 - vImgPos);
    let dir = 100 - Math.abs(90 - hImgPos);

    let score = (power + dir) / 2;

    let result = "MISS";
    if (score > 85) result = "PERFECT";
    else if (score > 60) result = "GOOD";
    else if (score > 40) result = "NORMAL";

    document.getElementById("result").innerText =
        result + " / 점수 : " + Math.round(score);

    gameState = "ready";
    refreshGameSystem();
}

</script>

</body>
</html>
