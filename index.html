<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Kick Challenge</title>

<style>
body {
    text-align: center;
    font-family: 'Malgun Gothic', sans-serif;
    background: #1a1a2e;
    color: #fff;
    margin: 0;
    padding: 20px;
    user-select: none;
}

h1 { color: #e43f5a; }

.box {
    width: 90%;
    max-width: 420px;
    margin: auto;
    background: #162447;
    padding: 20px;
    border-radius: 20px;
}

/* 버튼 */
button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    background: #e43f5a;
    color: white;
}

button:disabled {
    background: #555;
}

/* 골대 */
.center-target-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 25px auto;
    background: #111d35;
    border-radius: 24px;
    border: 3px solid #0f4c75;
    overflow: hidden;
}

/* 골대 */
#goal {
    position: absolute;
    left: 80px;
    top: 75px;
    font-size: 110px;
}

/* 키퍼 */
#keeper {
    position: absolute;
    left: 90px;
    top: 95px;
    font-size: 30px;
    transition: transform 0.4s ease;
}

/* 공 */
#ball {
    font-size: 45px;
    margin: 10px 0;
    transition: transform 0.7s cubic-bezier(0.2,0.8,0.2,1);
}

/* 게이지 */
.gauge-v-track {
    position:absolute;
    left:15px;
    top:20px;
    width:14px;
    height:240px;
    background:rgba(255,255,255,0.08);
    border-radius:7px;
}
.gauge-v-pointer {
    position:absolute;
    left:-4px;
    width:22px;
    height:12px;
    background:#ff4757;
}

.gauge-h-track {
    position:absolute;
    left:40px;
    bottom:15px;
    width:200px;
    height:14px;
    background:rgba(255,255,255,0.08);
}
.gauge-h-pointer {
    position:absolute;
    width:12px;
    height:22px;
    background:#00d2d3;
}

/* 결과 */
#result {
    font-size: 20px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>⚽ Run Kick Challenge</h1>

<div class="box">

    <input id="km" type="number" placeholder="러닝 km">
    <button onclick="getTicket()">러닝 → 슈팅권</button>

    <h3 id="ticket-view">보유권 : 0</h3>

    <button id="main-btn" onclick="action()" disabled>슛 준비</button>

    <!-- 골대 -->
    <div class="center-target-wrapper">

        <div id="goal">🥅</div>
        <div id="keeper">🧤</div>

        <div class="gauge-v-track">
            <div id="v-bar" class="gauge-v-pointer"></div>
        </div>

        <div class="gauge-h-track">
            <div id="h-bar" class="gauge-h-pointer"></div>
        </div>

    </div>

    <div id="ball">⚽</div>
    <h2 id="result"></h2>

</div>

<script>

let ticket = 0;
let state = "ready";

let v=0,h=0,vDir=4,hDir=4;
let vInt,hInt;

/* 슈팅권 */
function getTicket(){
    let km = Number(document.getElementById("km").value || 0);
    if(km <= 0) return;

    ticket += km;
    document.getElementById("ticket-view").innerText = "보유권 : " + ticket;
    document.getElementById("main-btn").disabled = ticket <= 0;
}

/* 진행 */
function action(){

    if(ticket <= 0) return;

    if(state === "ready"){
        state = "v";

        vInt = setInterval(()=>{
            v += vDir;
            if(v > 228 || v < 0) vDir *= -1;
            document.getElementById("v-bar").style.top = v + "px";
        }, 15);

        document.getElementById("main-btn").innerText = "파워 고정";
    }

    else if(state === "v"){
        clearInterval(vInt);
        state = "h";

        hInt = setInterval(()=>{
            h += hDir;
            if(h > 188 || h < 0) hDir *= -1;
            document.getElementById("h-bar").style.left = h + "px";
        }, 15);

        document.getElementById("main-btn").innerText = "각도 고정";
    }

    else if(state === "h"){
        clearInterval(hInt);
        shoot();
    }
}

/* 슛 */
function shoot(){

    ticket--;

    const V_CENTER = 114;
    const H_CENTER = 94;
    const T = 10;

    let isPerfect =
        Math.abs(v - V_CENTER) < T &&
        Math.abs(h - H_CENTER) < T;

    let ball = document.getElementById("ball");
    let keeper = document.getElementById("keeper");
    let result = document.getElementById("result");

    // 기본 슛
    ball.style.transform = "translateY(-240px) scale(0.4)";

    if(isPerfect){

        // ⚽ GOAL
        result.innerText = "🔥 GOAL!! PERFECT SHOT";

        keeper.style.transform = "translateX(-40px) rotate(-25deg)";

        setTimeout(()=>{
            ball.style.transform = "translateY(-280px) scale(0.2)";
        },150);

    } else {

        // 🧤 SAVE
        result.innerText = "🧤 SAVED!";

        keeper.style.transform = "translateX(-60px) rotate(-35deg)";

        ball.style.transform = "translateY(-120px) translateX(40px) scale(0.5)";
    }

    state = "result";
    document.getElementById("main-btn").innerText = "재시작";
}

</script>

</body>
</html>
