<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Hit Challenge</title>

<style>

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
background:#111827;
color:white;
font-family:'Malgun Gothic',sans-serif;
text-align:center;
overflow:hidden;
}

h1{
color:#ffd700;
text-shadow:0 0 15px #ffd700;
margin:10px 0;
}

.game{
width:95%;
max-width:430px;
margin:auto;
}

.field{
position:relative;
height:420px;
border-radius:25px;
overflow:hidden;
background:url("ground.png") center/cover;
transform:scale(1) translateY(0);
transition:0.2s;
}

/* pitch */
.pitch{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:18px;
font-weight:bold;
}

/* zone */
.zone{
position:absolute;
width:170px;
height:200px;
left:50%;
top:110px;
transform:translateX(-50%);
border:3px solid white;
box-shadow:0 0 20px #00ffff;
}

/* cross */
.cross-x,.cross-y{
position:absolute;
background:#ffd700;
}
.cross-x{width:100%;height:3px;top:50%;}
.cross-y{height:100%;width:3px;left:50%;}

/* center */
.center{
position:absolute;
width:28px;
height:28px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:8px;
background:rgba(255,215,0,.25);
border:3px solid #ffd700;
}

/* gauge */
.v-bar,.h-bar{
position:absolute;
width:18px;
height:18px;
background:white;
border-radius:6px;
}

/* ball */
.ball{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:#fff;
box-shadow:0 0 10px #fff;
left:50%;
top:0;
transform:translateX(-50%);
z-index:20;
}

/* player */
.player{
position:absolute;
right:8px;
bottom:8px;
width:90px;
z-index:30;
}

/* shake */
.shake{
animation:shake .25s;
}
@keyframes shake{
0%{transform:translate(0);}
25%{transform:translate(8px,-6px);}
50%{transform:translate(-8px,6px);}
75%{transform:translate(6px,3px);}
100%{transform:translate(0);}
}

/* UI */
.result{
font-size:20px;
color:#ffd700;
margin-top:8px;
}

.combo{
font-size:16px;
color:#ff4757;
}

#comboBonusText{
font-size:14px;
color:#ffd700;
}

/* button */
button{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
padding:14px;
border:0;
border-radius:15px;
background:#e43f5a;
color:white;
font-size:18px;
}

</style>
</head>

<body>

<h1>⚾ Baseball Hit</h1>

<div class="game">

<div id="field" class="field">

<div id="pitch" class="pitch">준비</div>

<div class="zone">
<div class="cross-x"></div>
<div class="cross-y"></div>
<div class="center"></div>

<div id="vbar" class="v-bar"></div>
<div id="hbar" class="h-bar"></div>

<div id="ball" class="ball"></div>

</div>

<img class="player" src="player.png">

<button onclick="action()" id="btn">START</button>

</div>

<div id="result" class="result">준비</div>
<div id="combo" class="combo">COMBO 0</div>

<div id="comboBonusText">없음</div>

<!-- NEW UI -->
<div class="combo">
🎯 SCORE: <span id="score">0</span> | 🏆 BEST: <span id="best">0</span> | ❤️ LIFE: <span id="life">10</span>
</div>

</div>

<script>

let state="ready";

let v=0,h=0;
let vd=3,hd=3;

let vi,hi;

let combo=0;

let life=10;
let totalScore=0;
let best=Number(localStorage.getItem("best"))||0;

document.getElementById("best").innerText=best;

/* ================= START ================= */
function start(){

state="vertical";

v=0; h=0;

vi=setInterval(()=>{

v += vd;
if(v>=180||v<=0) vd*=-1;

document.getElementById("vbar").style.top=v+"px";
document.getElementById("ball").style.top=v+"px";

},15);

}

/* ================= ACTION ================= */
function action(){

if(state==="ready"){
start();
return;
}

if(state==="vertical"){
clearInterval(vi);
state="horizontal";

hi=setInterval(()=>{

h += hd;
if(h>=120||h<=0) hd*=-1;

document.getElementById("hbar").style.left=h+"px";

},15);

return;
}

if(state==="horizontal"){
clearInterval(hi);
judge();
}

}

/* ================= JUDGE ================= */
function judge(){

let dx=Math.abs(h-60);
let dy=Math.abs(v-90);

let result="";
let distance=0;

let isHomeRun=false;

/* HIT DETECTION */
if(dx<22 && dy<25){
result="🔥 HOME RUN";
distance=300;
combo++;
isHomeRun=true;
}
else if(dx<35 && dy<50){
result="💥 3루타";
distance=200;
combo=0;
}
else if(dx<50 && dy<75){
result="⚾ 2루타";
distance=140;
combo=0;
}
else{
result="❌ MISS";
distance=0;
combo=0;
}

/* LIFE RULE */
/* 👉 홈런만 유지, 나머지는 -1 */
if(!isHomeRun){
life--;
}

/* SCORE */
totalScore += distance;

/* BEST */
if(distance > best){
best = distance;
localStorage.setItem("best", best);
}

/* UI */
document.getElementById("result").innerText =
result + " + " + distance + "m";

document.getElementById("combo").innerText =
"🔥 COMBO " + combo;

document.getElementById("score").innerText = totalScore;
document.getElementById("best").innerText = best;
document.getElementById("life").innerText = life;

/* GAME OVER */
if(life <= 0){
setTimeout(()=>{
alert("GAME OVER");
location.reload();
},300);
return;
}

}

</script>

</body>
</html>
