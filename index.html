<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Hit Challenge</title>

<style>

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
background:#111827;
color:white;
font-family:'Malgun Gothic',sans-serif;
text-align:center;
overflow:hidden;
}

h1{
color:#ffd700;
text-shadow:0 0 15px #ffd700;
margin:10px 0;
}

.game{
width:95%;
max-width:430px;
margin:auto;
}

.field{
position:relative;
height:420px;
border-radius:25px;
overflow:hidden;
background:#1f2937;
transition:0.2s;
}

/* pitch */
.pitch{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:18px;
font-weight:bold;
}

/* zone */
.zone{
position:absolute;
width:170px;
height:200px;
left:50%;
top:110px;
transform:translateX(-50%);
border:3px solid #00d2ff;
}

/* center */
.center{
position:absolute;
width:28px;
height:28px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:8px;
background:rgba(255,215,0,.25);
border:3px solid #ffd700;
}

/* ball */
.ball{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:#fff;
box-shadow:0 0 10px #fff;
left:50%;
top:0;
transform:translateX(-50%);
z-index:20;
transition:0s;
}

/* gauge */
.v-bar,.h-bar{
position:absolute;
width:18px;
height:18px;
background:white;
border-radius:6px;
}

/* player */
.player{
position:absolute;
right:8px;
bottom:8px;
width:90px;
}

/* shake */
.shake{
animation:shake .25s;
}
@keyframes shake{
0%{transform:translate(0);}
25%{transform:translate(8px,-6px);}
50%{transform:translate(-8px,6px);}
75%{transform:translate(6px,3px);}
100%{transform:translate(0);}
}

/* UI */
.result{
font-size:20px;
color:#ffd700;
margin-top:8px;
}

.life{
font-size:16px;
color:#00d2ff;
margin-top:5px;
}

/* button */
button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#e11d48;
color:white;
font-size:16px;
cursor:pointer;
}

.flash{
animation:flash 0.2s;
}
@keyframes flash{
0%{filter:brightness(1);}
50%{filter:brightness(2);}
100%{filter:brightness(1);}
}

</style>
</head>

<body>

<h1>⚾ Baseball Hit Challenge</h1>

<div class="game">

<div class="info">
🎯 결과: <span id="result">-</span>
</div>

<div class="life">
🔥 기회: <span id="life">10</span>
</div>

<div id="field" class="field">

<div class="pitch">READY</div>

<div class="zone">
<div class="center"></div>

<div id="vbar" class="v-bar"></div>
<div id="hbar" class="h-bar"></div>

<div id="ball" class="ball"></div>

</div>

<img class="player" src="player.png">

</div>

<button onclick="action()">SWING</button>

</div>

<script>

let state="ready";

let v=0,h=0;
let vd=3,hd=3;

let vi,hi;

let life=10;
let gameOver=false;

/* ================= START ================= */
function start(){

state="vertical";

v=0; h=0;

vi=setInterval(()=>{

v += vd;
if(v>=180||v<=0) vd*=-1;

document.getElementById("vbar").style.top=v+"px";
document.getElementById("ball").style.top=v+"px";

},15);

}

/* ================= ACTION ================= */
function action(){

if(gameOver) return;

if(state==="ready"){
start();
return;
}

if(state==="vertical"){
clearInterval(vi);
state="horizontal";

hi=setInterval(()=>{

h += hd;
if(h>=120||h<=0) hd*=-1;

document.getElementById("hbar").style.left=h+"px";

},15);

return;
}

if(state==="horizontal"){
clearInterval(hi);
judge();
}

}

/* ================= JUDGE ================= */
function judge(){

let dx=Math.abs(h-60);
let dy=Math.abs(v-90);

let result="❌ MISS";

if(dx<25 && dy<25){
result="🔥 HOME RUN";
}
else if(dx<40){
result="💥 HIT";
}

/* LIFE SYSTEM */
life--;

document.getElementById("result").innerText=result;
document.getElementById("life").innerText=life;

/* effect */
let field=document.getElementById("field");
field.classList.add("flash");
setTimeout(()=>field.classList.remove("flash"),200);

/* GAME OVER */
if(life<=0){
gameOver=true;

setTimeout(()=>{
alert("GAME OVER");
location.reload();
},300);

return;
}

/* reset next round */
setTimeout(resetRound,400);

}

/* ================= RESET ================= */
function resetRound(){

clearInterval(vi);
clearInterval(hi);

state="ready";

v=0; h=0;
vd=3; hd=3;

document.getElementById("ball").style.top="0px";
document.getElementById("vbar").style.top="0px";
document.getElementById("hbar").style.left="60px";

}

</script>

</body>
</html>
