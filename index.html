<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Hit Challenge</title>

<style>

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
background:#111827;
color:white;
font-family:'Malgun Gothic',sans-serif;
text-align:center;
overflow:hidden;
}

h1{
color:#ffd700;
text-shadow:0 0 15px #ffd700;
margin:10px 0;
}

.game{
width:95%;
max-width:430px;
margin:auto;
}

.field{
position:relative;
height:420px;
border-radius:25px;
overflow:hidden;
background:url("ground.png") center/cover;
transition:0.2s;
}

/* ZONE */
.zone{
position:absolute;
width:170px;
height:200px;
left:50%;
top:110px;
transform:translateX(-50%);
border:3px solid white;
box-shadow:0 0 20px #00ffff;
overflow:hidden;
}

/* cross */
.cross-x,.cross-y{
position:absolute;
background:#ffd700;
}
.cross-x{width:100%;height:3px;top:50%;}
.cross-y{height:100%;width:3px;left:50%;}

/* center */
.center{
position:absolute;
width:28px;
height:28px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:8px;
background:rgba(255,215,0,.25);
border:3px solid #ffd700;
}

/* GAUGE */
.v-bar,.h-bar{
position:absolute;
width:16px;
height:16px;
background:white;
border-radius:4px;
}

.v-bar{
left:50%;
transform:translateX(-50%);
top:0;
}

.h-bar{
top:50%;
transform:translateY(-50%);
left:0;
}

/* BALL */
.ball{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:#fff;
box-shadow:0 0 10px #fff;
left:50%;
top:0;
transform:translateX(-50%);
}

/* PLAYER */
.player{
position:absolute;
right:8px;
bottom:8px;
width:90px;
}

/* HOME RUN IMAGE */
#hrImg{
position:absolute;
left:50%;
top:40%;
transform:translate(-50%,-50%);
width:140px;
display:none;
z-index:999;
pointer-events:none;
}

/* UI */
.result{
font-size:20px;
color:#ffd700;
margin-top:8px;
}

.combo{
font-size:16px;
color:#ff4757;
}

.scoreboard{
font-size:14px;
margin-top:6px;
color:white;
}

/* BUTTON */
button{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
padding:14px;
border:0;
border-radius:15px;
background:#e43f5a;
color:white;
font-size:18px;
}

.shake{
animation:shake .25s;
}

@keyframes shake{
0%{transform:translate(0);}
25%{transform:translate(8px,-6px);}
50%{transform:translate(-8px,6px);}
75%{transform:translate(6px,3px);}
100%{transform:translate(0);}
}

</style>
</head>

<body>

<h1>⚾ Baseball Hit</h1>

<div class="game">

<div id="field" class="field">

<div class="zone">

<div class="cross-x"></div>
<div class="cross-y"></div>
<div class="center"></div>

<div id="vbar" class="v-bar"></div>
<div id="hbar" class="h-bar"></div>
<div id="ball" class="ball"></div>

<!-- HOME RUN IMAGE -->
<img id="hrImg" src="home_run.png">

</div>

<img class="player" src="player.png">

<button onclick="action()" id="btn">START</button>

</div>

<div id="result" class="result">준비</div>
<div id="combo" class="combo">🔥 COMBO 0</div>

<div class="scoreboard">
🎯 SCORE: <span id="score">0</span> |
🏆 BEST: <span id="best">0</span> |
❤️ LIFE: <span id="life">10</span>
</div>

</div>

clearInterval(vi);
clearInterval(hi);

h=0;

document.getElementById("vbar").style.top="0px";
document.getElementById("hbar").style.left="0px";
document.getElementById("ball").style.top="0px";
document.getElementById("ball").style.left="50%";

document.getElementById("hrImg").style.display="none";
}
