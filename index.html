<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Hit Challenge</title>

<style>

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
background:#111827;
color:white;
font-family:'Malgun Gothic',sans-serif;
text-align:center;
overflow:hidden;
}

h1{
color:#ffd700;
text-shadow:0 0 15px #ffd700;
margin:10px 0;
}

.game{
width:95%;
max-width:430px;
margin:auto;
}

.field{
position:relative;
height:420px;
border-radius:25px;
overflow:hidden;
background:url("ground.png") center/cover;
}

/* ================= ZONE (절대 기준) ================= */
.zone{
position:absolute;
width:170px;
height:200px;
left:50%;
top:110px;
transform:translateX(-50%);
border:3px solid white;
box-shadow:0 0 20px #00ffff;
overflow:hidden;
}

/* cross */
.cross-x,.cross-y{
position:absolute;
background:#ffd700;
}
.cross-x{width:100%;height:3px;top:50%;}
.cross-y{height:100%;width:3px;left:50%;}

/* center */
.center{
position:absolute;
width:28px;
height:28px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:8px;
background:rgba(255,215,0,.25);
border:3px solid #ffd700;
}

/* ================= GAUGE (zone 기준 고정) ================= */

.v-bar{
position:absolute;
width:16px;
height:16px;
background:white;
border-radius:4px;
left:50%;
transform:translateX(-50%);
top:0;
}

.h-bar{
position:absolute;
width:16px;
height:16px;
background:white;
border-radius:4px;
top:50%;
transform:translateY(-50%);
left:0;
}

/* ball */
.ball{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:#fff;
box-shadow:0 0 10px #fff;
left:50%;
top:0;
transform:translateX(-50%);
}

/* player */
.player{
position:absolute;
right:8px;
bottom:8px;
width:90px;
}

/* UI */
.result{
font-size:20px;
color:#ffd700;
margin-top:8px;
}

.combo{
font-size:16px;
color:#ff4757;
}

button{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
padding:14px;
border:0;
border-radius:15px;
background:#e43f5a;
color:white;
font-size:18px;
}

</style>
</head>

<body>

<h1>⚾ Baseball Hit</h1>

<div class="game">

<div id="field" class="field">

<div class="zone">

<div class="cross-x"></div>
<div class="cross-y"></div>
<div class="center"></div>

<div id="vbar" class="v-bar"></div>
<div id="hbar" class="h-bar"></div>
<div id="ball" class="ball"></div>

</div>

<img class="player" src="player.png">

<button onclick="action()" id="btn">START</button>

</div>

<div id="result" class="result">준비</div>
<div id="combo" class="combo">COMBO 0</div>

</div>

<script>

let state="ready";

let v=0,h=0;
let vd=3,hd=3;

let vi,hi;

/* ================= RESET (핵심 안정화) ================= */
function resetGame(){

clearInterval(vi);
clearInterval(hi);

state="ready";

v=0;
h=0;

vd=3;
hd=3;

/* UI 초기화 */
document.getElementById("result").innerText="준비";
document.getElementById("combo").innerText="COMBO 0";
document.getElementById("btn").innerText="START";

/* 게이지 초기화 */
document.getElementById("vbar").style.top="0px";
document.getElementById("hbar").style.left="0px";

/* ball 초기화 */
document.getElementById("ball").style.top="0px";
document.getElementById("ball").style.left="50%";
document.getElementById("ball").style.opacity="1";
}

/* ================= START ================= */
function start(){

state="vertical";

v=0;
h=0;

vi=setInterval(()=>{

v += vd;
if(v>=180||v<=0) vd*=-1;

document.getElementById("vbar").style.top=v+"px";
document.getElementById("ball").style.top=v+"px";

},15);

}

/* ================= ACTION ================= */
function action(){

if(state==="end"){
resetGame();
start();
return;
}

if(state==="ready"){
start();
return;
}

if(state==="vertical"){
clearInterval(vi);
state="horizontal";

hi=setInterval(()=>{

h += hd;
if(h>=120||h<=0) hd*=-1;

document.getElementById("hbar").style.left=h+"px";

},15);

return;
}

if(state==="horizontal"){
clearInterval(hi);
judge();
state="end";
document.getElementById("btn").innerText="RETRY";
}

}

/* ================= JUDGE ================= */
function judge(){

let dx=Math.abs(h-60);
let dy=Math.abs(v-90);

let result="❌ MISS";

if(dx<22 && dy<25){
result="🔥 HOME RUN";
}
else if(dx<40){
result="💥 HIT";
}

document.getElementById("result").innerText=result;

}

</script>

</body>
</html>
