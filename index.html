<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sbigames - 게임 포털</title>
<style>
body {
font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
background-color: #1a1a2e;
color: #ffffff;
margin: 0;
padding: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
text-align: center;
}
.container {
max-width: 600px;
padding: 30px;
background: #162447;
border-radius: 15px;
box-shadow: 0 10px 25px rgba(0,0,0,0.3);
border: 1px solid #0f4c75;
}
h1 {
color: #e43f5a;
font-size: 2.5rem;
margin-bottom: 10px;
text-transform: uppercase;
letter-spacing: 2px;
}
p {
color: #b2bec3;
font-size: 1.1rem;
line-height: 1.6;
}
.game-list {
margin-top: 30px;
padding: 0;
list-style: none;
}
.game-item {
background: #1f4068;
margin: 15px 0;
padding: 15px;
border-radius: 8px;
transition: transform 0.2s, background 0.2s;
cursor: pointer;
}
.game-item:hover {
transform: translateY(-3px);
background: #e43f5a;
}
.game-item a {
color: #fff;
text-decoration: none;
font-weight: bold;
font-size: 1.2rem;
display: block;
}
footer {
margin-top: 50px;
font-size: 0.8rem;
color: #6c757d;
}
</style>
</head>
<body>

<div class="container">
<h1>🎮 sbigames</h1>
<p>나만의 멋진 게임 저장소에 오신 것을 환영합니다!</p>
<p>기존의 깨진 파일 대신 사용할 수 있는 깔끔한 메인 페이지 파일입니다.</p>

<ul class="game-list">
<li class="game-item">
<a href="#">준비 중인 첫 번째 게임</a>
</li>
</ul>
</div>

<footer>
© 2026 sbigames. All rights reserved.
</footer>

</body>
</html>
