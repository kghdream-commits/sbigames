<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baseball Hit Challenge</title>

<style>

*{box-sizing:border-box}

html,body{
margin:0;
height:100%;
background:#111827;
color:white;
font-family:'Malgun Gothic',sans-serif;
text-align:center;
overflow:hidden;
}

h1{
color:#ffd700;
text-shadow:0 0 15px #ffd700;
}

.game{
width:95%;
max-width:430px;
margin:auto;
}


.field{
position:relative;
height:420px;
border-radius:25px;
overflow:hidden;
background:url("ground.png") center/cover;
transition:.2s;
}


/* FEVER */

.feverMode{
animation:shakeF .15s infinite;
filter:brightness(1.8);
box-shadow:0 0 50px red inset;
}


@keyframes shakeF{
0%{transform:translate(0)}
25%{transform:translate(5px,-3px)}
50%{transform:translate(-5px,3px)}
75%{transform:translate(3px,2px)}
100%{transform:translate(0)}
}



#feverText{
position:absolute;
top:50px;
left:50%;
transform:translateX(-50%);
font-size:40px;
font-weight:bold;
color:red;
display:none;
z-index:1000;
text-shadow:
0 0 20px yellow,
0 0 50px red;
}



/* ZONE */

.zone{
position:absolute;
width:170px;
height:200px;
left:50%;
top:110px;
transform:translateX(-50%);
border:3px solid white;
box-shadow:0 0 20px cyan;
}


.cross-x,.cross-y{
position:absolute;
background:#ffd700;
}

.cross-x{
width:100%;
height:3px;
top:50%;
}

.cross-y{
height:100%;
width:3px;
left:50%;
}


.center{
position:absolute;
width:28px;
height:28px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border:3px solid #ffd700;
border-radius:8px;
}



/* GAUGE */

.v-bar,.h-bar{
position:absolute;
width:16px;
height:16px;
background:white;
border-radius:5px;
}


.v-bar{
left:50%;
top:0;
transform:translateX(-50%);
}


.h-bar{
left:0;
top:50%;
transform:translateY(-50%);
}



.feverGauge{
background:red!important;
box-shadow:
0 0 20px red,
0 0 40px orange;
}



/* BALL */

.ball{
position:absolute;
width:12px;
height:12px;
border-radius:50%;
background:white;
left:50%;
top:0;
transform:translateX(-50%);
}



/* HR */

#hrImg{
position:absolute;
width:260px;
left:50%;
top:40%;
transform:translate(-50%,-50%);
display:none;
z-index:999;
}



/* PLAYER */

.player{
position:absolute;
right:8px;
bottom:8px;
width:90px;
}



.result{
font-size:22px;
color:#ffd700;
}


.combo{
color:#ff4757;
}



.scoreboard{
margin-top:10px;
}



button{

position:absolute;
bottom:10px;
left:50%;

transform:translateX(-50%);

width:90%;
padding:14px;

border:0;
border-radius:15px;

background:#e43f5a;
color:white;
font-size:18px;

}

</style>

</head>


<body>


<h1>⚾ Baseball Hit</h1>


<div class="game">


<div id="field" class="field">


<div id="feverText">
🔥 FEVER!!
</div>


<div class="zone">


<div class="cross-x"></div>
<div class="cross-y"></div>

<div class="center"></div>


<div id="vbar" class="v-bar"></div>
<div id="hbar" class="h-bar"></div>


<div id="ball" class="ball"></div>


<img id="hrImg" src="homerun.png">


</div>


<img class="player" src="player.png">


<button id="btn" onclick="action()">
START
</button>


</div>


<div id="result" class="result">
준비
</div>


<div id="combo" class="combo">
🔥 COMBO 0
</div>


<div class="scoreboard">

🎯 SCORE :
<span id="score">0</span>

<br>

🏆 BEST :
<span id="best">0</span>

<br>

❤️ LIFE :
<span id="life">10</span>

</div>


</div>



<script>


let state="ready";


let v=0;
let h=0;

let vd=3;
let hd=3;


let vi,hi;


let score=0;
let combo=0;
let life=10;


let fever=false;


let best=
Number(localStorage.getItem("best"))||0;


document.getElementById("best").innerText=best;




function resetGame(){


clearInterval(vi);
clearInterval(hi);


state="ready";

v=0;
h=0;


document.getElementById("vbar").style.top="0px";
document.getElementById("hbar").style.left="0px";


document.getElementById("hrImg").style.display="none";


feverOff();


document.getElementById("btn")
.innerText="START";


}




function start(){


state="vertical";


document.getElementById("btn")
.innerText="SWING";



clearInterval(vi);



vi=setInterval(()=>{


let speed = fever ? 2 : 1;


v += vd * speed;



if(v>=180 || v<=0)
vd*=-1;



document.getElementById("vbar")
.style.top=v+"px";


},15);


}





function action(){


if(state==="ready"){

start();
return;

}



if(state==="vertical"){


clearInterval(vi);

state="horizontal";


hi=setInterval(()=>{


let speed=fever?2:1;


h += hd*speed;



if(h>=120 || h<=0)
hd*=-1;



document.getElementById("hbar")
.style.left=h+"px";


},15);


return;


}



if(state==="horizontal"){


clearInterval(hi);

judge();


state="end";

document.getElementById("btn")
.innerText="RETRY";

return;

}




if(state==="end"){

resetGame();

start();

}


}





function feverOn(){


fever=true;


document.getElementById("field")
.classList.add("feverMode");


document.getElementById("feverText")
.style.display="block";


document.getElementById("vbar")
.classList.add("feverGauge");


document.getElementById("hbar")
.classList.add("feverGauge");


}



function feverOff(){


fever=false;


document.getElementById("field")
.classList.remove("feverMode");


document.getElementById("feverText")
.style.display="none";


document.getElementById("vbar")
.classList.remove("feverGauge");


document.getElementById("hbar")
.classList.remove("feverGauge");

}




function judge(){


let dx=Math.abs(h-60);
let dy=Math.abs(v-100);


if(dx<22 && dy<25){


score+=300;

combo++;


document.getElementById("result")
.innerText="🔥 HOME RUN";


homeFX();



if(combo>=5)

feverOn();



}

else{


combo=0;

life--;


feverOff();


document.getElementById("result")
.innerText="❌ MISS";

}


document.getElementById("combo")
.innerText="🔥 COMBO "+combo;


document.getElementById("score")
.innerText=score;


document.getElementById("life")
.innerText=life;



if(score>best){

best=score;

localStorage.setItem("best",best);

document.getElementById("best")
.innerText=best;

}


}




function homeFX(){

let img=document.getElementById("hrImg");

img.style.display="block";


setTimeout(()=>{

img.style.display="none";

},1000);


}



</script>

</body>
</html>
