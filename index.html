<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Hit Challenge</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#111827;
color:white;
text-align:center;
overflow:hidden;
}

/* ================= SCREEN ================= */

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#gameScreen{
display:none;
}

/* ================= FIELD ================= */

.field{
position:relative;
width:95%;
max-width:420px;
height:420px;
background:#1f2937;
border-radius:20px;
overflow:hidden;
}

.pitch{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
}

.zone{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:160px;
height:200px;
border:3px solid #00d2ff;
}

.center{
position:absolute;
width:25px;
height:25px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:gold;
border-radius:6px;
}

/* ball */
.ball{
position:absolute;
width:12px;
height:12px;
background:white;
border-radius:50%;
left:50%;
top:0;
transform:translateX(-50%);
}

/* gauge */
.v-bar,.h-bar{
position:absolute;
width:18px;
height:18px;
background:white;
border-radius:4px;
}

/* UI */
.info{
margin:10px;
font-size:18px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#e11d48;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

/* RESULT FX */
.flash{
animation:flash 0.2s;
}

@keyframes flash{
0%{filter:brightness(1);}
50%{filter:brightness(2);}
100%{filter:brightness(1);}
}

</style>
</head>

<body>

<!-- ================= START SCREEN ================= -->
<div id="startScreen" class="screen">
<h1>⚾ Baseball Hit</h1>
<p>10번의 기회로 홈런을 도전하세요</p>
<button onclick="startGame()">START</button>
</div>

<!-- ================= GAME SCREEN ================= -->
<div id="gameScreen" class="screen">

<div class="info">
🎯 기회: <span id="life">10</span> | 💥 결과: <span id="result">-</span>
</div>

<div class="field" id="field">

<div class="pitch" id="pitchText">READY</div>

<div class="zone">
<div class="center"></div>

<div id="vbar" class="v-bar"></div>
<div id="hbar" class="h-bar"></div>

<div id="ball" class="ball"></div>

</div>

</div>

<button onclick="action()">SWING</button>

</div>

<script>

let state="ready";

let v=0,h=0;
let vd=3,hd=3;

let vi,hi;

let life=10;
let gameOver=false;

/* ================= START GAME ================= */
function startGame(){

life=10;
gameOver=false;

document.getElementById("startScreen").style.display="none";
document.getElementById("gameScreen").style.display="flex";

resetBall();
}

/* ================= RESET BALL ================= */
function resetBall(){

clearInterval(vi);
clearInterval(hi);

state="ready";

v=0; h=0;
vd=3; hd=3;

document.getElementById("ball").style.top="0px";
document.getElementById("vbar").style.top="0px";
document.getElementById("hbar").style.left="60px";

document.getElementById("result").innerText="-";
document.getElementById("life").innerText=life;
}

/* ================= ACTION ================= */
function action(){

if(gameOver) return;

if(state==="ready"){
start();
return;
}

if(state==="vertical"){
clearInterval(vi);
state="horizontal";

hi=setInterval(()=>{

h += hd;
if(h>=120||h<=0) hd*=-1;

document.getElementById("hbar").style.left=h+"px";

},15);

return;
}

if(state==="horizontal"){
clearInterval(hi);
judge();
}

}

/* ================= START ================= */
function start(){

state="vertical";

v=0; h=0;

vi=setInterval(()=>{

v += vd;
if(v>=180||v<=0) vd*=-1;

document.getElementById("vbar").style.top=v+"px";
document.getElementById("ball").style.top=v+"px";

},15);

}

/* ================= JUDGE ================= */
function judge(){

let dx=Math.abs(h-60);
let dy=Math.abs(v-90);

let result="❌ 실패";

if(dx<25 && dy<25){
result="🔥 HOME RUN";
}
else if(dx<40){
result="💥 HIT";
}
else{
result="❌ MISS";
}

/* LIFE SYSTEM */
life--;

document.getElementById("result").innerText=result;

/* FLASH */
document.getElementById("field").classList.add("flash");
setTimeout(()=>{
document.getElementById("field").classList.remove("flash");
},200);

/* GAME OVER */
if(life<=0){
gameOver=true;
setTimeout(()=>{
document.getElementById("gameScreen").style.display="none";
document.getElementById("startScreen").style.display="flex";
},800);
return;
}

/* reset next round */
setTimeout(resetBall,400);

}

</script>

</body>
</html>
