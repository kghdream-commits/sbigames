<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Run Kick Challenge - Fixed Layout</title>
<style>
    body { text-align: center; font-family: sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 20px; }
    .box { width: 90%; max-width: 420px; margin: auto; background: #1e293b; padding: 20px; border-radius: 20px; }

    /* 버튼 정상화 */
    #main-btn { width: 100%; padding: 15px; margin: 15px 0; border: none; border-radius: 12px; background: #e43f5a; color: white; font-weight: bold; cursor: pointer; }
    
    /* 게임 영역 고정 */
    .game-area { position: relative; width: 280px; height: 280px; margin: 20px auto; background: #0f172a; border: 2px solid #334155; border-radius: 15px; overflow: hidden; }

    /* 게이지 위치 고정 */
    .v-bar { position: absolute; left: 5px; top: 0px; width: 8px; height: 10px; background: #ff4757; border-radius: 50%; }
    .h-bar { position: absolute; bottom: 5px; left: 0px; width: 10px; height: 8px; background: #00d2d3; border-radius: 50%; }

    /* 골대 및 오브젝트 */
    #goal-frame { position: absolute; width: 160px; height: 100px; border: 3px solid #fff; border-top-left-radius: 30px; border-top-right-radius: 30px; top: 40px; left: 60px; }
    #keeper { position: absolute; top: 60px; left: 120px; font-size: 30px; transition: transform 0.3s; }
    #ball { position: absolute; bottom: 30px; left: 120px; font-size: 35px; transition: transform 0.5s; z-index: 10; }
</style>
</head>
<body>
    <div class="box">
        <h3 id="ticket-view">보유권 : 0</h3>
        <button id="main-btn" onclick="handleShoot()">슈팅 준비</button>
        
        <div class="game-area">
            <div id="goal-frame"></div>
            <div id="keeper">🧤</div>
            <div id="ball">⚽</div>
            <div id="v-bar" class="v-bar"></div>
            <div id="h-bar" class="h-bar"></div>
        </div>
        <h2 id="result-text"></h2>
    </div>

<script>
    let gameState = "ready", vPos = 0, hPos = 0, vDir = 5, hDir = 5, vInt, hInt;
    let ticket = 0;

    window.addEventListener("keydown", (e) => { if(e.code === "Space") handleShoot(); });

    function handleShoot() {
        if(gameState === "ready") {
            gameState = "v";
            vInt = setInterval(() => { vPos += vDir; if(vPos > 260 || vPos < 0) vDir *= -1; document.getElementById("v-bar").style.top = vPos + "px"; }, 20);
        } else if(gameState === "v") {
            clearInterval(vInt); gameState = "h";
            hInt = setInterval(() => { hPos += hDir; if(hPos > 260 || hPos < 0) hDir *= -1; document.getElementById("h-bar").style.left = hPos + "px"; }, 20);
        } else if(gameState === "h") {
            clearInterval(hInt); checkGoal();
        }
    }

    function checkGoal() {
        // vPos(위치 0~260, 중앙 130), hPos(위치 0~260, 중앙 130)
        let isGoal = Math.abs(130 - vPos) < 40 && Math.abs(130 - hPos) < 40;
        let ball = document.getElementById("ball"), keeper = document.getElementById("keeper");

        if(isGoal) {
            ball.style.transform = "translateY(-100px) scale(0.6)";
            keeper.style.transform = "translateX(40px)";
            document.getElementById("result-text").innerText = "GOAL!!";
        } else {
            ball.style.transform = "translateY(-20px) rotate(45deg)";
            keeper.style.transform = "translateX(-30px)";
            document.getElementById("result-text").innerText = "BLOCKED!";
        }
        gameState = "result";
        setTimeout(() => {
            ball.style.transform = "none"; keeper.style.transform = "none";
            document.getElementById("result-text").innerText = ""; gameState = "ready";
        }, 2000);
    }
</script>
</body>
</html>
