<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baseball Hit Challenge</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial, sans-serif;
}

h1{
    color:#ffd700;
}


.game{
    max-width:420px;
    margin:auto;
}


.field{

    position:relative;
    height:600px;
    overflow:hidden;

    background:url("ground.png") center/cover;

}


/* 타격존 */

.zone{

position:absolute;

width:170px;
height:220px;

left:50%;
top:150px;

transform:translateX(-50%);

border:3px solid white;

}


.cross-x{

position:absolute;
width:100%;
height:3px;

top:50%;

background:red;

}


.cross-y{

position:absolute;

height:100%;
width:3px;

left:50%;

background:#00ffff;

}



.ball{

position:absolute;

width:50px;

left:50%;
top:550px;

transform:translateX(-50%);

}



.player{

position:absolute;

right:20px;
bottom:20px;

width:140px;

}



.result{

height:50px;
font-size:30px;

color:#ffd700;

}



button{

padding:15px 30px;
font-size:20px;

border:0;
border-radius:15px;

background:#e43f5a;
color:white;

}

</style>

</head>


<body>


<h1>⚾ Baseball Hit</h1>


<div class="game">


<div class="field">


<div class="zone">

<div class="cross-x"></div>
<div class="cross-y"></div>

</div>


<img id="ball" class="ball" src="ball.png">


<img class="player" src="player.png">


<img id="effect" style="
display:none;
position:absolute;
width:250px;
left:50%;
top:200px;
transform:translateX(-50%);
" src="homerun.png">


</div>


<div id="result" class="result">
준비
</div>


<button onclick="start()">
공 던지기
</button>


<button onclick="hit()">
스윙
</button>


</div>



<script>


let ball=document.getElementById("ball");

let moving=false;

let y=550;

let timer;



function start(){

if(moving)return;


moving=true;

y=550;

ball.style.top=y+"px";


timer=setInterval(()=>{


y-=6;

ball.style.top=y+"px";


if(y<150){

clearInterval(timer);

moving=false;

document.getElementById("result").innerText=
"타이밍 실패";

}


},20);


}




function hit(){


if(!moving)return;


clearInterval(timer);

moving=false;



let error=Math.abs(y-260);



let result="";



if(error<25){

result="🔥 HOME RUN";

document.getElementById("effect").style.display="block";


}

else if(error<70){

result="💥 3루타";

}

else if(error<130){

result="⚾ 2루타";

}

else{

result="❌ 헛스윙";

}



document.getElementById("result").innerText=result;


}



</script>


</body>
</html>
