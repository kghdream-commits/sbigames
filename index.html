<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Kick Challenge</title>

<style>
body {
    text-align: center;
    font-family: 'Malgun Gothic', sans-serif;
    background: #1a1a2e;
    color: #fff;
    margin: 0;
    padding: 20px;
    user-select: none;
}

h1 {
    color: #e43f5a;
    text-shadow: 0 0 10px rgba(228, 63, 90, 0.5);
}

.box {
    width: 90%;
    max-width: 420px;
    margin: auto;
    background: #162447;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    border: 1px solid #0f4c75;
}

/* 🕹️ 2번: 입체적인 3D 스타일 버튼 디자인 */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #e43f5a;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    box-shadow: 0 5px 0 #b22c44, 0 8px 15px rgba(0,0,0,0.3);
    transition: all 0.1s ease;
    position: relative;
}

button:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #b22c44, 0 3px 5px rgba(0,0,0,0.3);
}

button:disabled {
    background: #555 !important;
    box-shadow: 0 5px 0 #333 !important;
    cursor: not-allowed;
    transform: none !important;
}

input[type="number"] {
    width: 45%;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid #0f4c75;
    background: #1a1a2e;
    color: white;
    font-size: 1rem;
    text-align: center;
    margin-right: 5px;
}

/* ===================================================
   🎯 과녁 일체형 액자 조준 시스템
   =================================================== */
.center-target-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 25px auto;
    background: #111d35;
    border-radius: 24px;
    border: 3px solid #0f4c75;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
    overflow: hidden;
    transition: all 0.4s ease;
}

.wrapper-golden {
    border-color: #ffd700 !important;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 20px #ffd700, 0 0 40px rgba(255,215,0,0.4) !important;
    animation: borderPulseGolden 1.5s infinite alternate;
}
.wrapper-silver {
    border-color: #00ffcc !important;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 20px #00ffcc, 0 0 40px rgba(0,255,204,0.4) !important;
    animation: borderPulseSilver 1.5s infinite alternate;
}

@keyframes borderPulseGolden {
    0% { box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 10px #ffd700; }
    100% { box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 25px #ffd700, 0 0 45px #ff007f; }
}
@keyframes borderPulseSilver {
    0% { box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 10px #00ffcc; }
    100% { box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 25px #00ffcc, 0 0 45px #00d2d3; }
}

#fx-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
}

#perfect-popup {
    position: absolute;
    width: 100%;
    top: 40%;
    left: 0;
    font-size: 34px;
    font-weight: 900;
    z-index: 6;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.3);
    font-family: 'Arial Black', sans-serif;
}

@keyframes pop-bounce {
    0% { opacity: 0; transform: scale(0.3) rotate(-15deg); }
    50% { opacity: 1; transform: scale(1.4) rotate(10deg); }
    70% { transform: scale(0.9) rotate(-5deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

#target {
    position: absolute;
    width: 120px;
    height: 120px;
    left: 80px;
    top: 80px;
    font-size: 110px;
    line-height: 120px;
    text-align: center;
    z-index: 1;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* ↕️ 상하 */
.gauge-v-track {
    position: absolute;
    left: 15px;
    top: 20px;
    width: 14px;
    height: 240px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 7px;
    z-index: 2;
}
.gauge-v-center-line {
    position: absolute;
    top: 47%;
    left: -1px;
    width: 16px;
    height: 16px; 
    background: #ffd700;
    border-radius: 3px;
}
.gauge-v-pointer {
    position: absolute;
    left: -4px;
    top: 0px;
    width: 22px;
    height: 12px;
    background: #ff4757;
    border-radius: 4px;
    box-shadow: 0 0 10px #ff4757;
}

/* ↔️ 좌우 */
.gauge-h-track {
    position: absolute;
    left: 40px;
    bottom: 15px;
    width: 200px;
    height: 14px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 7px;
    z-index: 2;
}
.gauge-h-center-line {
    position: absolute;
    left: 46%;
    top: -1px;
    width: 16px; 
    height: 16px;
    background: #ffd700;
    border-radius: 3px;
}
.gauge-h-pointer {
    position: absolute;
    left: 0px;
    top: -4px;
    width: 12px;
    height: 22px;
    background: #00d2d3;
    border-radius: 4px;
    box-shadow: 0 0 10px #00d2d3;
}

#ball {
    font-size: 45px;
    margin: 10px 0;
}

.record {
    background: #1f4068;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
}

.status-msg {
    color: #ffd700;
    font-weight: bold;
    margin: 10px 0;
    font-size: 1.05rem;
    min-height: 24px;
}

.shoot-action-btn {
    width: 85%;
    padding: 15px;
    font-size: 1.1rem;
    margin: 10px 0;
    border-radius: 12px;
    background: #e43f5a;
    box-shadow: 0 5px 0 #b22c44, 0 8px 15px rgba(0,0,0,0.3);
}

#btn-reset {
    background: #2ed573;
    box-shadow: 0 5px 0 #21a054, 0 8px 15px rgba(0,0,0,0.3);
    width: 85%;
    padding: 15px;
    margin: 10px 0;
    font-size: 1.1rem;
    border-radius: 12px;
}

.bonus-banner {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: bold;
    margin-left: 8px;
}

.accuracy-label {
    font-size: 0.95rem;
    color: #a4b0be;
    margin: 4px 0;
}
</style>
</head>

<body>

<h1>🏃⚽ Run Kick Challenge</h1>

<div class="box">

    <!-- 🔥 난이도 영역 "표시만 제거" (JS 영향 방지) -->
    <span id="level" style="display:none;">EASY</span>

    <h3>러닝 거리 입력</h3>
    <input id="km" type="number" placeholder="km 입력" min="1">
    <button onclick="getTicket()">받기</button>
    
    <h3 id="ticket-view">보유권 : 0</h3>

    <h4 id="game-status" class="status-msg"></h4>

    <button id="main-shoot-btn" onclick="handleShootClick()" disabled>슈팅권 없음</button>
    <button id="btn-reset" onclick="resetToReady()" style="display:none;">재시도</button>

    <div id="target-wrapper" class="center-target-wrapper">
        <div id="target">🎯</div>
        <canvas id="fx-canvas" width="280" height="280"></canvas>
        <div id="perfect-popup">PERFECT!!</div>

        <div class="gauge-v-track">
            <div id="v-center" class="gauge-v-center-line"></div>
            <div id="power-bar" class="gauge-v-pointer"></div>
        </div>

        <div class="gauge-h-track">
            <div id="h-center" class="gauge-h-center-line"></div>
            <div id="direction-bar" class="gauge-h-pointer"></div>
        </div>
    </div>

    <div id="ball">⚽</div>

    <h2 id="result"></h2>

    <div class="record">
        <p>오늘 BEST : <span id="today">0</span>m</p>
        <p>월간 BEST : <span id="month">0</span>m</p>
        <p>누적 거리 : <span id="daily">0</span>m</p>
    </div>
</div>

<script>
/* JS는 그대로 유지 */
</script>

</body>
</html>
